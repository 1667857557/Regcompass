name: Bootstrap RegCompassR 1.8.3 assets

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-1.8.3.yaml
      - scripts/bootstrap_1_8_3.py
      - scripts/build-bundled-gems.R

permissions:
  contents: write

jobs:
  build:
    if: github.head_ref == 'agent/regcompass-1.8.3-portable-gems'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/regcompass-1.8.3-portable-gems
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install model-build dependencies
        shell: Rscript {0}
        run: |
          install.packages(c("Matrix", "yaml"))

      - name: Apply 1.8.3 source patches
        run: python scripts/bootstrap_1_8_3.py

      - name: Build bundled Human-GEM and Mouse-GEM assets
        shell: Rscript {0}
        run: source("scripts/build-bundled-gems.R")

      - name: Parse updated R sources and tests
        shell: Rscript {0}
        run: |
          invisible(lapply(list.files("R", pattern = "[.]R$", full.names = TRUE), parse))
          invisible(lapply(list.files("tests/testthat", pattern = "[.]R$", full.names = TRUE), parse))

      - name: Commit generated release assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bundle validated Human-GEM and Mouse-GEM models"
          git push origin HEAD:agent/regcompass-1.8.3-portable-gems
