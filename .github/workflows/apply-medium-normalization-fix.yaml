name: Apply medium normalization fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out clean audited commit
        uses: actions/checkout@v7
        with:
          ref: 5b2f3697589f80a403d2ef704910002cefbe51f0
          fetch-depth: 0
          show-progress: false

      - name: Extract and apply patch
        shell: bash
        run: |
          git fetch origin agent/math-biology-audit-v13
          git show origin/agent/math-biology-audit-v13:tools/apply_medium_normalization_fix.py > /tmp/apply_medium_normalization_fix.py
          python3 -m py_compile /tmp/apply_medium_normalization_fix.py
          python3 /tmp/apply_medium_normalization_fix.py

      - name: Commit to isolated generated branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "RegCompass audit bot"
          git config user.email "actions@users.noreply.github.com"
          git add R/microcompass.R
          git diff --cached --check
          git commit -m "Preserve no-constraint medium scenarios across cache normalization [medium-normalization-applied]"
          git push --force origin HEAD:refs/heads/agent/medium-normalization-generated
