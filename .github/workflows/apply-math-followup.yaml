name: Apply mathematical audit follow-up

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-followup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v7
        with:
          ref: agent/math-biology-audit-v13

      - name: Apply follow-up corrections
        run: python3 tools/apply_math_followup.py

      - name: Archive corrected files
        shell: bash
        run: |
          mkdir -p math-followup/R math-followup/tests/testthat
          cp R/stats.R math-followup/R/stats.R
          cp R/microcompass.R math-followup/R/microcompass.R
          cp tests/testthat/test_math_biology_audit_v13.R math-followup/tests/testthat/test_math_biology_audit_v13.R

      - name: Upload corrected files
        uses: actions/upload-artifact@v4
        with:
          name: math-audit-followup-files
          path: math-followup
          if-no-files-found: error
          retention-days: 7
