name: Apply and validate species refactor v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-validate-commit:
    if: github.head_ref == 'agent/fix-species-medium-refactor-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-species-medium-refactor-v2
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install validation dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "Matrix", "matrixStats", "SeuratObject", "testthat",
            "highs", "BiocManager", "roxygen2", "rcmdcheck"
          ))
          BiocManager::install("limma", ask = FALSE, update = FALSE)

      - name: Apply verified source archive
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee source-application.log) 2>&1
          cat .github/refactor-bundle.part* > "$RUNNER_TEMP/regcompass-refactor.tar.xz"
          echo "51d2ce16459f2e1e53838fe697c19cdd5e47ab49b59d99808713d416d7bbb10e  $RUNNER_TEMP/regcompass-refactor.tar.xz" | sha256sum -c -
          xz -t "$RUNNER_TEMP/regcompass-refactor.tar.xz"
          tar -xJf "$RUNNER_TEMP/regcompass-refactor.tar.xz" -C .

          rm -f R/workflow_stage_01_architecture.R
          rm -f R/workflow_stage_02_compatibility.R
          rm -f R/workflow_stage_03_signed_projection.R
          rm -f R/workflow_stage_04_result_contracts.R
          rm -f R/workflow_stage_04b_human_medium_presets.R
          rm -f R/workflow_stage_04c_medium_default_scales.R
          rm -f R/workflow_stage_05_api_contracts.R
          rm -f R/workflow_stage_06_audit_contracts.R

          rm -f .github/refactor-bundle.part*
          rm -f .github/refactor-trigger-*.txt
          rm -f .github/workflows/apply-refactor-bundle.yml
          rm -f .github/workflows/apply-refactor-diagnostics.yml
          rm -f .github/workflows/apply-refactor-source-only.yml
          rm -f .github/workflows/export-source-for-agent.yml
          rm -f .github/workflows/validate-apply-refactor.yml
          rm -f .github/workflows/apply-refactor-v2.yml

          python3 - <<'PY'
          from pathlib import Path

          VALID_R_ESCAPES = set("abfnrtv\\'\"`01234567xuU\n")

          def normalize_r_string_escapes(text: str) -> str:
              output = []
              quote = None
              in_comment = False
              index = 0
              while index < len(text):
                  char = text[index]
                  if in_comment:
                      output.append(char)
                      if char == "\n":
                          in_comment = False
                      index += 1
                      continue
                  if quote is None:
                      if char == "#":
                          in_comment = True
                      elif char in ("'", '"'):
                          quote = char
                      output.append(char)
                      index += 1
                      continue
                  if char == "\\" and index + 1 < len(text):
                      following = text[index + 1]
                      if following not in VALID_R_ESCAPES:
                          output.extend(("\\", "\\", following))
                      else:
                          output.extend((char, following))
                      index += 2
                      continue
                  output.append(char)
                  if char == quote:
                      quote = None
                  index += 1
              return "".join(output)

          paths = [Path("DESCRIPTION"), Path("NAMESPACE")]
          paths.extend(Path("R").glob("*.R"))
          paths.extend(Path("tests/testthat").glob("*.R"))
          for path in paths:
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              text = normalize_r_string_escapes(text)
              path.write_text(text.rstrip("\n") + "\n", encoding="utf-8")
          PY

          rm -f NAMESPACE
          rm -f man/rc_prepare_human2_gem.Rd
          rm -f man/rc_make_medium_scenarios.Rd
          rm -f man/rc_run_regcompass.Rd
          rm -f man/rc_run_regcompass_one_shot.Rd
          Rscript -e 'roxygen2::roxygenise()'
          git diff --check

      - name: Parse sources
        shell: bash
        run: |
          set -o pipefail
          Rscript - <<'RS' 2>&1 | tee parse-output.txt
          files <- c(
            list.files("R", pattern = "[.]R$", full.names = TRUE),
            list.files("tests/testthat", pattern = "[.]R$", full.names = TRUE)
          )
          for (file in files) {
            cat("Parsing ", file, "\n", sep = "")
            tryCatch(
              parse(file),
              error = function(error) {
                cat("PARSE_ERROR_FILE=", file, "\n", sep = "")
                cat("PARSE_ERROR_MESSAGE=", conditionMessage(error), "\n", sep = "")
                stop(error)
              }
            )
          }
          RS

      - name: Install package with tests
        shell: bash
        run: |
          set -o pipefail
          R CMD INSTALL --install-tests . --no-multiarch --with-keep.source 2>&1 | tee install-output.txt

      - name: Test installed namespace
        shell: bash
        run: |
          set -o pipefail
          Rscript -e 'library(testthat); library(RegCompassR); test_check("RegCompassR", reporter = "summary")' 2>&1 | tee test-output.txt

      - name: Run package check
        shell: bash
        run: |
          set -o pipefail
          R CMD check --no-manual --no-build-vignettes . 2>&1 | tee check-output.txt

      - name: Commit validated refactor
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git status --short
          git commit -m "Complete species-aware workflow refactor"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/fix-species-medium-refactor-v2

      - name: Upload validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: species-refactor-v2-diagnostics
          path: |
            source-application.log
            parse-output.txt
            install-output.txt
            test-output.txt
            check-output.txt
            *.Rcheck/00check.log
            DESCRIPTION
            NAMESPACE
            R
            man
            tests
          if-no-files-found: warn
