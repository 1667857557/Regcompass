name: Apply metadata contract fixes

on:
  push:
    branches:
      - agent/fix-metacell-pando-metadata-contracts
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-metacell-pando-metadata-contracts
          fetch-depth: 0
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'
      - name: Apply exact source edits
        run: python tools/apply_metadata_contract_fixes.py
      - name: Parse changed R sources and tests
        run: |
          Rscript -e 'parse(file="R/metacell_fragments.R"); parse(file="R/pando_grn.R"); parse(file="tests/testthat/test-metadata-contracts.R")'
      - name: Verify intended source changes
        run: |
          grep -F '.rc_restore_metacell_metadata <- function(' R/metacell_fragments.R
          grep -F '.rc_remap_projection_metadata <- function(' R/pando_grn.R
          grep -F 'x$sample_id <- NULL' R/pando_grn.R
          ! grep -F 'x <- merge(x, group_meta, by = "group_id", all.x = TRUE, sort = FALSE)' R/pando_grn.R
      - name: Commit patched source
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add R/metacell_fragments.R R/pando_grn.R tests/testthat/test-metadata-contracts.R
          git diff --cached --quiet && exit 0
          git commit -m 'Fix metacell and Pando metadata contracts'
          git push origin HEAD:agent/fix-metacell-pando-metadata-contracts
