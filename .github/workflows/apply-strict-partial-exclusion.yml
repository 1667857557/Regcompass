name: Apply strict partial reaction exclusion

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-metacell-compass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0
      - name: Exclude incomplete GPR candidates
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('R/zzz_core_workflow_corrections.R')
          text = path.read_text()
          old = '''  partial_anchor <- membership_keys %in% setdiff(candidate_keys, hard_keys) &
              answer$reaction_membership$inclusion_stage %in%
                c("core_grn_gene", "partial_gpr_candidate")'''
          new = '''  partial_anchor <- membership_keys %in%
              setdiff(candidate_keys, hard_keys)'''
          if old not in text:
              raise RuntimeError('partial candidate exclusion anchor missing')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/apply-strict-partial-exclusion.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Exclude all incomplete GPR candidates from meta-modules"
          git push origin HEAD:agent/global-metacell-compass
