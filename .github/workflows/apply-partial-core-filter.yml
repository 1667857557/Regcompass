name: Apply partial-core filter fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-metacell-compass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0
      - name: Remove incomplete GPR anchors
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('R/zzz_core_workflow_corrections.R')
          text = path.read_text()
          old = '''  membership_keys <- key(answer$reaction_membership)

            answer$reaction_membership$is_core <- membership_keys %in% hard_keys
            partial_anchor <- membership_keys %in% setdiff(candidate_keys, hard_keys) &
              answer$reaction_membership$inclusion_stage == "core_grn_gene"
            answer$reaction_membership$inclusion_stage[partial_anchor] <-
              "partial_gpr_candidate"
          '''
          new = '''  membership_keys <- key(answer$reaction_membership)

            answer$reaction_membership$is_core <- membership_keys %in% hard_keys
            partial_anchor <- membership_keys %in% setdiff(candidate_keys, hard_keys) &
              answer$reaction_membership$inclusion_stage %in%
                c("core_grn_gene", "partial_gpr_candidate")
            if (any(partial_anchor)) {
              answer$reaction_membership <- answer$reaction_membership[
                !partial_anchor,
                , drop = FALSE
              ]
              membership_keys <- key(answer$reaction_membership)
            }
          '''
          if old not in text:
              raise RuntimeError('partial-core wrapper anchor missing')
          text = text.replace(old, new, 1)
          path.write_text(text)
          Path('.github/workflows/apply-partial-core-filter.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Exclude incomplete GPR core anchors"
          git push origin HEAD:agent/global-metacell-compass
