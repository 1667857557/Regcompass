name: Apply Pando-only peak-gene workflow

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0
      - name: Apply migration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          exec(compile(Path("tools/apply_pando_only.py").read_text(), "tools/apply_pando_only.py", "exec"))
          PY
