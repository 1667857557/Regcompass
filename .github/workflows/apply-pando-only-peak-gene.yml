name: Apply Pando-only peak-gene workflow

on:
  push:
    branches:
      - agent/global-metacell-compass
    paths:
      - .github/workflows/apply-pando-only-peak-gene.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0

      - name: Remove duplicate LinkPeaks and derive confidence from Pando
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def function_end(text, start):
              brace = text.index('{', start)
              depth = 0
              quote = None
              escaped = False
              for i in range(brace, len(text)):
                  ch = text[i]
                  if quote is not None:
                      if escaped:
                          escaped = False
                      elif ch == '\\':
                          escaped = True
                      elif ch == quote:
                          quote = None
                      continue
                  if ch in ('"', "'"):
                      quote = ch
                  elif ch == '{':
                      depth += 1
                  elif ch == '}':
                      depth -= 1
                      if depth == 0:
                          return i + 1
              raise RuntimeError('Unbalanced R function')

          pando_path = Path('R/pando_grn.R')
          pando = pando_path.read_text()
          marker = "#' Run sample-specific Pando GRNs and construct reaction meta-modules"
          start = pando.index(marker)
          replacement = r'''.rc_pando_assay_data <- function(object, assay) {
            value <- tryCatch(
              SeuratObject::GetAssayData(object, assay = assay, slot = "data"),
              error = function(e) NULL
            )
            if (is.null(value)) {
              value <- tryCatch(
                SeuratObject::GetAssayData(object, assay = assay, layer = "data"),
                error = function(e) NULL
              )
            }
            if (is.null(value) || nrow(value) == 0L || ncol(value) == 0L) {
              stop("Pando-derived confidence requires normalized ATAC data in the peak assay.", call. = FALSE)
            }
            value
          }

          .rc_pando_region_key <- function(x) {
            x <- trimws(as.character(x))
            x <- sub("^([^:]+):(\\d+)-(\\d+)$", "\\1-\\2-\\3", x)
            x <- sub("^([^:]+):(\\d+):(\\d+)$", "\\1-\\2-\\3", x)
            x
          }

          .rc_pando_gene_confidence <- function(significant_edges, object, atac_assay,
                                                target_genes = NULL) {
            units <- colnames(object)
            genes <- if (is.null(target_genes)) character() else unique(toupper(as.character(target_genes)))
            genes <- genes[!is.na(genes) & nzchar(genes)]
            if (!length(genes) && is.data.frame(significant_edges) && "target" %in% colnames(significant_edges)) {
              genes <- unique(toupper(as.character(significant_edges$target)))
              genes <- genes[!is.na(genes) & nzchar(genes)]
            }
            confidence <- matrix(
              NA_real_, nrow = length(genes), ncol = length(units),
              dimnames = list(tolower(genes), units)
            )
            diagnostics <- data.frame(
              gene = genes,
              n_pando_edges = integer(length(genes)),
              n_unique_regions = integer(length(genes)),
              n_matched_regions = integer(length(genes)),
              matched_region_fraction = NA_real_,
              confidence_source = "pando_internal_peak_gene_accessibility",
              stringsAsFactors = FALSE
            )
            if (!is.data.frame(significant_edges) || !nrow(significant_edges)) {
              return(list(gene_confidence = confidence, diagnostics = diagnostics))
            }
            required <- c("target", "region")
            missing <- setdiff(required, colnames(significant_edges))
            if (length(missing)) {
              stop("Pando coefficient table lacks columns required for confidence: ",
                   paste(missing, collapse = ", "), call. = FALSE)
            }
            edges <- significant_edges
            edges$target <- toupper(trimws(as.character(edges$target)))
            edges$region <- trimws(as.character(edges$region))
            edges <- edges[
              !is.na(edges$target) & nzchar(edges$target) &
                !is.na(edges$region) & nzchar(edges$region) &
                edges$target %in% genes,
              , drop = FALSE
            ]
            if (!nrow(edges)) {
              return(list(gene_confidence = confidence, diagnostics = diagnostics))
            }
            edge_weight <- rep(1, nrow(edges))
            if ("estimate" %in% colnames(edges)) {
              estimate <- abs(suppressWarnings(as.numeric(edges$estimate)))
              edge_weight[is.finite(estimate) & estimate > 0] <- estimate[is.finite(estimate) & estimate > 0]
            }
            if ("rsq" %in% colnames(edges)) {
              rsq <- suppressWarnings(as.numeric(edges$rsq))
              quality <- sqrt(pmax(rsq, 0))
              quality[!is.finite(quality) | quality <= 0] <- 1
              edge_weight <- edge_weight * quality
            }
            edge_weight[!is.finite(edge_weight) | edge_weight <= 0] <- 1
            edges$.weight <- edge_weight
            atac <- .rc_pando_assay_data(object, atac_assay)
            peak_ids <- rownames(atac)
            peak_keys <- .rc_pando_region_key(peak_ids)
            keep_peak <- !duplicated(peak_keys)
            peak_lookup <- stats::setNames(peak_ids[keep_peak], peak_keys[keep_peak])
            edges$.peak_id <- unname(peak_lookup[.rc_pando_region_key(edges$region)])

            for (gene in genes) {
              all_gene_edges <- edges[edges$target == gene, , drop = FALSE]
              diagnostics$n_pando_edges[diagnostics$gene == gene] <- nrow(all_gene_edges)
              diagnostics$n_unique_regions[diagnostics$gene == gene] <- length(unique(all_gene_edges$region))
              matched <- all_gene_edges[!is.na(all_gene_edges$.peak_id) & nzchar(all_gene_edges$.peak_id), , drop = FALSE]
              diagnostics$n_matched_regions[diagnostics$gene == gene] <- length(unique(matched$.peak_id))
              denominator <- diagnostics$n_unique_regions[diagnostics$gene == gene]
              diagnostics$matched_region_fraction[diagnostics$gene == gene] <-
                if (denominator > 0L) diagnostics$n_matched_regions[diagnostics$gene == gene] / denominator else NA_real_
              if (!nrow(matched)) next
              aggregated <- stats::aggregate(
                matched$.weight,
                by = list(peak_id = matched$.peak_id),
                FUN = sum,
                na.rm = TRUE
              )
              colnames(aggregated)[[2L]] <- "weight"
              accessibility <- as.matrix(atac[aggregated$peak_id, units, drop = FALSE])
              accessibility_score <- rc_gene_score(accessibility)
              accessibility_score[!is.finite(accessibility) | accessibility <= 0] <- 0
              weights <- aggregated$weight
              weights[!is.finite(weights) | weights <= 0] <- 1
              weights <- weights / sum(weights)
              confidence[tolower(gene), ] <- as.numeric(crossprod(weights, accessibility_score))
            }
            list(gene_confidence = confidence, diagnostics = diagnostics)
          }

          .rc_pando_reaction_confidence_matrix <- function(confidence, reaction_ids, unit_ids) {
            out <- matrix(
              NA_real_, nrow = length(reaction_ids), ncol = length(unit_ids),
              dimnames = list(reaction_ids, unit_ids)
            )
            if (!is.data.frame(confidence) || !nrow(confidence)) return(out)
            required <- c("reaction_id", "pool_id", "reaction_confidence")
            if (!all(required %in% colnames(confidence))) {
              stop("Pando reaction confidence table is incomplete.", call. = FALSE)
            }
            row_index <- match(as.character(confidence$reaction_id), reaction_ids)
            col_index <- match(as.character(confidence$pool_id), unit_ids)
            keep <- !is.na(row_index) & !is.na(col_index)
            out[cbind(row_index[keep], col_index[keep])] <- as.numeric(confidence$reaction_confidence[keep])
            out
          }

          #' Run strict-stratum Pando GRNs and construct reaction meta-modules
          #'
          #' Pando performs peak-gene/TF modeling internally. RegCompass does not run
          #' a separate Signac LinkPeaks pass in this workflow. Metacell-specific ATAC
          #' confidence is derived from significant Pando regions and peak accessibility.
          #' @export
          rc_run_pando_meta_modules <- function(metacell_object,
                                                gem,
                                                outdir,
                                                pfm,
                                                genome,
                                                sample_col = "sample_id",
                                                condition_col = "condition",
                                                celltype_col = "cell_type",
                                                group_cols = NULL,
                                                single_cell_genes = NULL,
                                                rna_assay = "RNA",
                                                atac_assay = "ATAC",
                                                min_metacells = 20L,
                                                pando_initiate_args = list(exclude_exons = TRUE),
                                                pando_motif_args = list(),
                                                pando_infer_args = list(method = "glm", tf_cor = 0.1, peak_cor = 0,
                                                                        adjust_method = "fdr", parallel = FALSE),
                                                padj_threshold = 0.05,
                                                min_abs_estimate = 0,
                                                min_model_rsq = 0.1,
                                                require_padj = TRUE,
                                                top_k_neighbors = 5L,
                                                min_shared_tfs = 1L,
                                                min_tf_jaccard = 0,
                                                max_targets_per_tf = 200L,
                                                subsystem_table = NULL,
                                                expansion_mode = c("ordered_once", "fixed_point"),
                                                save_sample_metacell_objects = TRUE,
                                                save_pando_objects = TRUE,
                                                BPPARAM = NULL,
                                                on_sample_error = c("record", "stop")) {
            expansion_mode <- match.arg(expansion_mode)
            on_sample_error <- match.arg(on_sample_error)
            if (!inherits(metacell_object, "Seurat")) stop("`metacell_object` must inherit from Seurat.", call. = FALSE)
            if (!requireNamespace("Pando", quietly = TRUE)) stop("Install the pinned Pando fork before running meta-modules.", call. = FALSE)
            pando_install <- .rc_validate_pando_repository()
            installed <- pando_install$version
            if (!requireNamespace("Seurat", quietly = TRUE) || !requireNamespace("Signac", quietly = TRUE)) {
              stop("Packages 'Seurat' and 'Signac' are required.", call. = FALSE)
            }
            if (is.null(group_cols)) {
              group_cols <- .rc_strict_stratum_cols(sample_col, condition_col, celltype_col)
            }
            group_cols <- unique(as.character(group_cols))
            missing_group_cols <- setdiff(group_cols, colnames(metacell_object@meta.data))
            if (length(missing_group_cols)) stop("Missing metadata column(s): ", paste(missing_group_cols, collapse = ", "), call. = FALSE)
            if (!sample_col %in% group_cols) stop("`group_cols` must include `sample_col`.", call. = FALSE)
            display_cols <- unique(c("group_id", group_cols))
            module_cols <- unique(c("group_id", group_cols, "sample_id", "module_id"))
            dir.create(outdir, recursive = TRUE, showWarnings = FALSE)
            dir.create(file.path(outdir, "pando_objects"), recursive = TRUE, showWarnings = FALSE)
            dir.create(file.path(outdir, "sample_metacell_objects"), recursive = TRUE, showWarnings = FALSE)

            metabolic_genes <- gem$metabolic_genes %||% rc_metabolic_gpr_genes(gem$gpr_table)
            parsed_gpr <- rc_parse_gpr_table(gem$gpr_table)
            reaction_ids <- names(parsed_gpr)
            rna_genes <- rownames(.rc_get_assay_counts(metacell_object, rna_assay))
            if (is.null(single_cell_genes)) single_cell_genes <- rna_genes
            target_upper <- intersect(
              toupper(.rc_mm_trim_unique(single_cell_genes)),
              toupper(.rc_mm_trim_unique(metabolic_genes))
            )
            target_genes <- .rc_mm_trim_unique(rna_genes[toupper(rna_genes) %in% target_upper])
            if (!length(target_genes)) stop("No overlap between single-cell RNA genes and Human-GEM metabolic genes.", call. = FALSE)

            meta <- metacell_object@meta.data
            meta$.rc_pando_group_id <- rc_make_stratum_id(meta, group_cols)
            group_ids <- unique(as.character(meta$.rc_pando_group_id))

            run_one_group <- function(group_id) {
              cells <- rownames(meta)[as.character(meta$.rc_pando_group_id) == group_id]
              vals <- meta[match(cells[[1L]], rownames(meta)), group_cols, drop = FALSE]
              sample <- as.character(vals[[sample_col]][[1L]])
              status <- data.frame(
                group_id = group_id, vals, n_metacells = length(cells),
                n_target_genes = length(target_genes), status = "pending",
                n_edges = 0L, n_significant_edges = 0L,
                n_pando_confidence_genes = 0L, n_pando_confidence_reactions = 0L,
                error_class = NA_character_, error_message = NA_character_,
                stringsAsFactors = FALSE, check.names = FALSE
              )
              empty_gene <- matrix(numeric(), nrow = 0L, ncol = length(cells),
                                   dimnames = list(character(), cells))
              empty_reaction <- matrix(NA_real_, nrow = length(reaction_ids), ncol = length(cells),
                                       dimnames = list(reaction_ids, cells))
              if (length(cells) < as.integer(min_metacells)) {
                status$status <- "skipped_too_few_metacells"
                return(list(status = status, all = data.frame(), significant = data.frame(),
                            gene_confidence = empty_gene, gene_confidence_diagnostics = data.frame(),
                            reaction_confidence = data.frame(), reaction_confidence_matrix = empty_reaction))
              }
              one <- tryCatch({
                obj <- subset(metacell_object, cells = cells)
                obj <- Seurat::NormalizeData(obj, assay = rna_assay, verbose = FALSE)
                obj <- Signac::RunTFIDF(obj, assay = atac_assay)
                group_file_id <- gsub("[^A-Za-z0-9_.-]+", "_", group_id)
                if (isTRUE(save_sample_metacell_objects)) {
                  saveRDS(obj, file.path(outdir, "sample_metacell_objects", paste0(group_file_id, ".rds")))
                }
                init_defaults <- list(object = obj, peak_assay = atac_assay, rna_assay = rna_assay)
                init_defaults[names(pando_initiate_args)] <- NULL
                grn <- do.call(Pando::initiate_grn, c(init_defaults, pando_initiate_args))
                motif_defaults <- list(object = grn, pfm = pfm, genome = genome)
                motif_defaults[names(pando_motif_args)] <- NULL
                grn <- do.call(Pando::find_motifs, c(motif_defaults, pando_motif_args))
                infer_defaults <- list(object = grn, genes = target_genes)
                infer_defaults[names(pando_infer_args)] <- NULL
                grn <- do.call(Pando::infer_grn, c(infer_defaults, pando_infer_args))
                tab <- rc_extract_pando_tf_peak_gene(
                  grn, sample_id = sample, padj_threshold = padj_threshold,
                  min_abs_estimate = min_abs_estimate, min_model_rsq = min_model_rsq,
                  require_padj = require_padj
                )
                add_group_meta <- function(x) {
                  if (!is.data.frame(x) || !nrow(x)) return(x)
                  x$group_id <- group_id
                  for (col in group_cols) x[[col]] <- vals[[col]][[1L]]
                  x[, c(display_cols, setdiff(colnames(x), display_cols)), drop = FALSE]
                }
                tab$all <- add_group_meta(tab$all)
                tab$significant <- add_group_meta(tab$significant)
                pando_confidence <- .rc_pando_gene_confidence(
                  tab$significant, obj, atac_assay = atac_assay,
                  target_genes = target_genes
                )
                pando_confidence$diagnostics <- add_group_meta(pando_confidence$diagnostics)
                reaction_confidence <- rc_reaction_confidence(
                  parsed_gpr,
                  gene_confidence = pando_confidence$gene_confidence,
                  unit_ids = colnames(obj)
                )
                reaction_confidence <- add_group_meta(reaction_confidence)
                reaction_confidence_matrix <- .rc_pando_reaction_confidence_matrix(
                  reaction_confidence, reaction_ids, colnames(obj)
                )
                if (isTRUE(save_pando_objects)) {
                  saveRDS(grn, file.path(outdir, "pando_objects", paste0(group_file_id, ".rds")))
                }
                list(
                  all = tab$all,
                  significant = tab$significant,
                  gene_confidence = pando_confidence$gene_confidence,
                  gene_confidence_diagnostics = pando_confidence$diagnostics,
                  reaction_confidence = reaction_confidence,
                  reaction_confidence_matrix = reaction_confidence_matrix
                )
              }, error = function(e) e)
              if (inherits(one, "error")) {
                status$status <- "failed"
                status$error_class <- class(one)[[1L]]
                status$error_message <- conditionMessage(one)
                if (identical(on_sample_error, "stop")) stop(one)
                return(list(status = status, all = data.frame(), significant = data.frame(),
                            gene_confidence = empty_gene, gene_confidence_diagnostics = data.frame(),
                            reaction_confidence = data.frame(), reaction_confidence_matrix = empty_reaction))
              }
              status$status <- "ok"
              status$n_edges <- nrow(one$all)
              status$n_significant_edges <- nrow(one$significant)
              status$n_pando_confidence_genes <- sum(rowSums(is.finite(one$gene_confidence)) > 0L)
              status$n_pando_confidence_reactions <- sum(rowSums(is.finite(one$reaction_confidence_matrix)) > 0L)
              c(list(status = status), one)
            }

            group_results <- rc_parallel_lapply(group_ids, run_one_group, BPPARAM = BPPARAM)
            status_table <- .rc_bind_frames_fill(lapply(group_results, `[[`, "status"))
            all_table <- .rc_bind_frames_fill(lapply(group_results, `[[`, "all"))
            sig_table <- .rc_bind_frames_fill(lapply(group_results, `[[`, "significant"))
            gene_confidence <- .rc_cbind_matrix_union(lapply(group_results, `[[`, "gene_confidence"))
            gene_confidence_diagnostics <- .rc_bind_frames_fill(lapply(group_results, `[[`, "gene_confidence_diagnostics"))
            reaction_confidence <- .rc_bind_frames_fill(lapply(group_results, `[[`, "reaction_confidence"))
            reaction_confidence_matrix <- .rc_cbind_matrix_union(lapply(group_results, `[[`, "reaction_confidence_matrix"))
            .rc_mm_write_tsv_gz(status_table, file.path(outdir, "pando_sample_status.tsv.gz"))
            .rc_mm_write_tsv_gz(all_table, file.path(outdir, "pando_tf_peak_gene_all.tsv.gz"))
            .rc_mm_write_tsv_gz(sig_table, file.path(outdir, "pando_tf_peak_gene_significant.tsv.gz"))
            .rc_mm_write_tsv_gz(gene_confidence_diagnostics, file.path(outdir, "pando_gene_confidence_diagnostics.tsv.gz"))
            .rc_mm_write_tsv_gz(reaction_confidence, file.path(outdir, "pando_reaction_confidence.tsv.gz"))
            saveRDS(gene_confidence, file.path(outdir, "pando_gene_confidence.rds"))
            saveRDS(reaction_confidence_matrix, file.path(outdir, "pando_reaction_confidence_matrix.rds"))
            if (!nrow(sig_table)) stop("No significant Pando TF-peak-gene edges were available across strata.", call. = FALSE)

            sig_for_projection <- sig_table
            sig_for_projection$sample_id <- sig_for_projection$group_id
            projection <- rc_project_metabolic_grn(
              sig_for_projection, metabolic_genes = metabolic_genes,
              top_k = top_k_neighbors, min_shared_tfs = min_shared_tfs,
              min_tf_jaccard = min_tf_jaccard,
              max_targets_per_tf = max_targets_per_tf,
              include_direct_metabolic_tf = TRUE
            )
            group_meta <- unique(status_table[, c("group_id", group_cols), drop = FALSE])
            remap_projection <- function(x) {
              if (!nrow(x)) return(x)
              x$group_id <- as.character(x$sample_id)
              x <- merge(x, group_meta, by = "group_id", all.x = TRUE, sort = FALSE)
              x$sample_id <- as.character(x[[sample_col]])
              x[, c(display_cols, setdiff(colnames(x), display_cols)), drop = FALSE]
            }
            projection$nodes <- remap_projection(projection$nodes)
            projection$edges <- remap_projection(projection$edges)
            core <- rc_map_meta_module_core_reactions(projection$nodes, gem$gpr_table)
            if (nrow(core)) {
              core <- merge(core, unique(projection$nodes[, module_cols, drop = FALSE]),
                            by = c("sample_id", "module_id"), all.x = TRUE, sort = FALSE)
              core <- core[, c(display_cols, setdiff(colnames(core), display_cols)), drop = FALSE]
            }
            expanded <- rc_expand_meta_module_reactions(
              gem, core, subsystem_table = subsystem_table,
              expansion_mode = expansion_mode
            )
            if (nrow(expanded$reaction_membership)) {
              expanded$reaction_membership <- merge(
                expanded$reaction_membership,
                unique(core[, module_cols, drop = FALSE]),
                by = c("sample_id", "module_id"), all.x = TRUE, sort = FALSE
              )
              expanded$reaction_membership <- expanded$reaction_membership[
                , c(display_cols, setdiff(colnames(expanded$reaction_membership), display_cols)), drop = FALSE
              ]
            }
            if (nrow(expanded$summary)) {
              expanded$summary <- merge(
                expanded$summary, unique(core[, module_cols, drop = FALSE]),
                by = c("sample_id", "module_id"), all.x = TRUE, sort = FALSE
              )
              expanded$summary <- expanded$summary[
                , c(display_cols, setdiff(colnames(expanded$summary), display_cols)), drop = FALSE
              ]
            }
            .rc_mm_write_tsv_gz(projection$nodes, file.path(outdir, "metabolic_gene_nodes.tsv.gz"))
            .rc_mm_write_tsv_gz(projection$edges, file.path(outdir, "metabolic_gene_edges.tsv.gz"))
            .rc_mm_write_tsv_gz(core, file.path(outdir, "core_gene_reaction.tsv.gz"))
            .rc_mm_write_tsv_gz(expanded$reaction_membership, file.path(outdir, "meta_module_reactions.tsv.gz"))
            .rc_mm_write_tsv_gz(expanded$summary, file.path(outdir, "meta_module_summary.tsv.gz"))

            out <- list(
              schema_version = "regcompass_pando_meta_module_v2",
              pando_installed_version = installed,
              pando_remote_username = pando_install$remote_username,
              pando_remote_repo = pando_install$remote_repo,
              pando_remote_ref = pando_install$remote_ref,
              pando_remote_sha = pando_install$remote_sha,
              target_metabolic_genes = target_genes,
              sample_status = status_table,
              tf_peak_gene_all = all_table,
              tf_peak_gene_significant = sig_table,
              gene_confidence = gene_confidence,
              gene_confidence_diagnostics = gene_confidence_diagnostics,
              reaction_confidence = reaction_confidence,
              reaction_confidence_matrix = reaction_confidence_matrix,
              confidence_source = "pando_internal_peak_gene_accessibility",
              metabolic_gene_nodes = projection$nodes,
              metabolic_gene_edges = projection$edges,
              core_gene_reaction = core,
              reaction_membership = expanded$reaction_membership,
              meta_module_summary = expanded$summary,
              crossref_maps = expanded$crossref_maps
            )
            saveRDS(out, file.path(outdir, "pando_meta_modules.rds"))
            out
          }
          '''
          pando_path.write_text(pando[:start] + replacement + '\n')

          global_path = Path('R/global_workflow.R')
          global_text = global_path.read_text()
          stratum_start = global_text.index('.rc_run_regcompass_stratum <- function')
          stratum_end = function_end(global_text, stratum_start)
          stratum_replacement = r'''.rc_metacell_logcpm <- function(counts, scale_factor = 1e6) {
            counts <- methods::as(counts, "dgCMatrix")
            library_size <- Matrix::colSums(counts)
            if (any(!is.finite(library_size)) || any(library_size <= 0)) {
              stop("Every metacell must have a positive finite RNA library size.", call. = FALSE)
            }
            scaled <- counts %*% Matrix::Diagonal(x = scale_factor / library_size)
            log1p(scaled)
          }

          .rc_run_regcompass_stratum <- function(object, group_id, group_cols, gem, outdir, pfm, genome,
                                                  fragment_files = NULL, sample_col = "sample_id",
                                                  condition_col = "condition", celltype_col = "cell_type",
                                                  rna_assay = "RNA", atac_assay = "ATAC",
                                                  metacell_args = list(), layer1_args = list(), pando_args = list()) {
            retired_link_args <- intersect(
              names(layer1_args),
              c("linkpeaks_args", "min_metacells_for_linkpeaks", "force_metacell_relink",
                "allow_supplied_links", "peak_gene_links", "recompute_peak_gene_links")
            )
            if (length(retired_link_args)) {
              stop(
                "Integrated RegCompass no longer runs a separate LinkPeaks step; Pando performs peak-gene modeling internally. Remove: ",
                paste(retired_link_args, collapse = ", "), call. = FALSE
              )
            }
            meta <- object@meta.data
            ids <- rc_make_stratum_id(meta, group_cols)
            cells <- rownames(meta)[ids == group_id]
            if (!length(cells)) stop("No cells found for stratum: ", group_id, call. = FALSE)
            one <- subset(object, cells = cells)
            stratum_dir <- file.path(outdir, gsub("[^A-Za-z0-9_.-]+", "_", group_id))
            dir.create(stratum_dir, recursive = TRUE, showWarnings = FALSE)
            capacity_params <- list(
              promiscuity_mode = layer1_args$promiscuity_mode %||% "sqrt",
              and_method = layer1_args$and_method %||% "boltzmann",
              tau = layer1_args$tau %||% 0.20,
              or_method = "sum_sqrtK"
            )
            metacell_defaults <- list(
              object = one,
              outdir = file.path(stratum_dir, "01_metacells"),
              sample_col = sample_col,
              condition_col = condition_col,
              celltype_col = celltype_col,
              rna_assay = rna_assay,
              atac_assay = atac_assay,
              fragment_files = fragment_files,
              save_metacell_object = TRUE,
              save_counts = TRUE,
              save_fragments = TRUE,
              require_fragment_aggregation = TRUE,
              fragment_aggregation_backend = "regcompass",
              BPPARAM = FALSE,
              on_stratum_error = "stop"
            )
            reserved <- intersect(names(metacell_args), names(metacell_defaults))
            reserved <- setdiff(
              reserved,
              c("rna_reduction", "atac_reduction", "rna_dims", "atac_dims", "gamma",
                "seed", "min_cells_per_stratum", "min_metacell_size",
                "min_metacells_per_stratum", "adaptive_gamma", "label_col",
                "bgzip_path", "tabix_path", "fragment_nb_cl", "overwrite")
            )
            if (length(reserved)) stop("`metacell_args` cannot override workflow fields: ", paste(reserved, collapse = ", "), call. = FALSE)
            metacell_defaults[names(metacell_args)] <- NULL
            metacells <- do.call(rc_make_supercell2_metacells, c(metacell_defaults, metacell_args))
            minimum_metacells <- as.integer(pando_args$min_metacells %||% 20L)
            if (nrow(metacells$metacell_meta) < minimum_metacells) {
              stop("Stratum `", group_id, "` produced fewer than ", minimum_metacells, " metacells.", call. = FALSE)
            }
            metacell_object <- rc_load_or_merge_metacell_objects(
              metacells$metacell_objects,
              fragment_manifest = metacells$fragment_manifest,
              metacell_meta = metacells$metacell_meta,
              fragment_files = metacells$fragment_files,
              rna_assay = rna_assay,
              atac_assay = atac_assay,
              require_complete_fragments = TRUE
            )
            pando_args$BPPARAM <- NULL
            pando_infer_args <- pando_args$pando_infer_args %||% list()
            pando_infer_args$parallel <- FALSE
            pando_args$pando_infer_args <- pando_infer_args
            pando_args$group_cols <- NULL
            pando_args$sample_col <- NULL
            pando_args$condition_col <- NULL
            pando_args$celltype_col <- NULL
            pando_defaults <- list(
              metacell_object = metacell_object,
              gem = gem,
              outdir = file.path(stratum_dir, "02_pando_meta_modules"),
              pfm = pfm,
              genome = genome,
              sample_col = sample_col,
              condition_col = condition_col,
              celltype_col = celltype_col,
              group_cols = group_cols,
              single_cell_genes = rownames(.rc_get_assay_counts(one, rna_assay)),
              rna_assay = rna_assay,
              atac_assay = atac_assay,
              min_metacells = minimum_metacells,
              BPPARAM = FALSE,
              on_sample_error = "stop"
            )
            pando_defaults[names(pando_args)] <- NULL
            meta_modules <- do.call(rc_run_pando_meta_modules, c(pando_defaults, pando_args))
            if (is.null(meta_modules$reaction_confidence_matrix)) {
              stop("Pando did not return metacell-specific reaction confidence.", call. = FALSE)
            }
            gpr_genes <- toupper(rc_metabolic_gpr_genes(gem$gpr_table))
            rna_counts <- metacells$rna_counts[
              toupper(rownames(metacells$rna_counts)) %in% gpr_genes,
              , drop = FALSE
            ]
            if (!nrow(rna_counts)) stop("No Human-GEM GPR genes were retained in metacell RNA counts.", call. = FALSE)
            rna_logcpm <- .rc_metacell_logcpm(rna_counts)
            unit_meta <- metacells$metacell_meta
            id_col <- if ("metacell_id" %in% colnames(unit_meta)) "metacell_id" else if ("pool_id" %in% colnames(unit_meta)) "pool_id" else NULL
            if (is.null(id_col)) stop("Metacell metadata lacks metacell_id/pool_id.", call. = FALSE)
            if (!"pool_id" %in% colnames(unit_meta)) unit_meta$pool_id <- as.character(unit_meta[[id_col]])
            if (!"unit_id" %in% colnames(unit_meta)) unit_meta$unit_id <- unit_meta$pool_id
            unit_meta <- unit_meta[match(colnames(rna_logcpm), as.character(unit_meta$pool_id)), , drop = FALSE]
            if (anyNA(unit_meta$pool_id)) stop("Metacell metadata are incomplete after Pando.", call. = FALSE)
            reaction_confidence <- as.matrix(meta_modules$reaction_confidence_matrix)
            missing_confidence_units <- setdiff(colnames(rna_logcpm), colnames(reaction_confidence))
            if (length(missing_confidence_units)) {
              stop("Pando reaction confidence is missing metacells: ",
                   paste(utils::head(missing_confidence_units, 10L), collapse = ", "), call. = FALSE)
            }
            reaction_confidence <- reaction_confidence[, colnames(rna_logcpm), drop = FALSE]
            layer1 <- list(
              schema_version = "regcompass_stratum_evidence_v2",
              rna_metacell_logcpm = rna_logcpm,
              reaction_confidence = reaction_confidence,
              reaction_confidence_source = "pando_internal_peak_gene_accessibility",
              unit_meta = unit_meta,
              metacell_meta = unit_meta,
              strict_group_id = group_id
            )
            artifact <- list(
              schema_version = "regcompass_stratum_v2",
              group_id = group_id,
              group_cols = group_cols,
              capacity_params = capacity_params,
              layer1 = layer1,
              grn_meta_modules = meta_modules,
              metacell_meta = unit_meta,
              metacell_dir = stratum_dir
            )
            artifact_file <- file.path(stratum_dir, "stratum_result.rds")
            saveRDS(artifact, artifact_file)
            list(
              group_id = group_id, status = "ok", artifact_file = artifact_file,
              n_cells = length(cells), n_metacells = nrow(unit_meta),
              error_class = NA_character_, error_message = NA_character_
            )
          }'''
          global_text = global_text[:stratum_start] + stratum_replacement + global_text[stratum_end:]
          merge_start = global_text.index('.rc_merge_stratum_layer1 <- function')
          merge_end = function_end(global_text, merge_start)
          old_merge = global_text[merge_start:merge_end]
          old_conf = '''  confidence_list <- lapply(artifacts, function(x) {
            rc_layer2_confidence_matrix(x$layer1$reaction_confidence, x$layer1$C_raw)
          })
          reaction_confidence <- .rc_cbind_matrix_union(confidence_list)'''
          new_conf = '''  confidence_list <- lapply(artifacts, function(x) {
            value <- x$layer1$reaction_confidence
            if (is.null(value)) stop("Every upstream artifact must contain Pando-derived reaction confidence.", call. = FALSE)
            as.matrix(value)
          })
          reaction_confidence <- .rc_cbind_matrix_union(confidence_list)'''
          if old_conf not in old_merge:
              raise RuntimeError('Global confidence merge anchor missing')
          new_merge = old_merge.replace(old_conf, new_conf)
          new_merge = new_merge.replace(
              'capacity_calibration_scope = "all_metacells_global_gene_score_and_reaction_q95",',
              'capacity_calibration_scope = "all_metacells_global_gene_score_and_reaction_q95",\n    reaction_confidence_source = "pando_internal_peak_gene_accessibility",'
          )
          global_text = global_text[:merge_start] + new_merge + global_text[merge_end:]
          global_path.write_text(global_text)

          test_path = Path('tests/testthat/test_global_metacell_workflow.R')
          test_text = test_path.read_text()
          test_text = test_text.replace(
            'test_that("global Layer 1 recomputes gene scores and reaction Q95 across all metacells", {',
            'test_that("global Layer 1 recomputes gene scores and uses Pando confidence", {'
          )
          test_text = test_text.replace(
            'C_raw = matrix(1, nrow = 1, dimnames = list("R1", "u1")),\n        rna_metacell_logcpm',
            'rna_metacell_logcpm'
          )
          test_text = test_text.replace(
            'C_raw = matrix(1, nrow = 1, dimnames = list("R1", "u2")),\n        rna_metacell_logcpm',
            'rna_metacell_logcpm'
          )
          test_text = test_text.replace(
            'reaction_confidence = matrix(1, nrow = 1, dimnames = list("R1", "u1")),',
            'reaction_confidence = matrix(0.8, nrow = 1, dimnames = list("R1", "u1")),'
          )
          test_text = test_text.replace(
            'reaction_confidence = matrix(1, nrow = 1, dimnames = list("R1", "u2")),',
            'reaction_confidence = matrix(0.4, nrow = 1, dimnames = list("R1", "u2")),'
          )
          insertion_anchor = 'test_that("global meta-module union preserves source tables and creates one canonical module", {'
          new_test = r'''test_that("integrated stratum worker does not rerun LinkPeaks", {
            body_text <- paste(deparse(body(.rc_run_regcompass_stratum)), collapse = "\n")
            expect_match(body_text, "rc_run_pando_meta_modules", fixed = TRUE)
            expect_match(body_text, "pando_internal_peak_gene_accessibility", fixed = TRUE)
            expect_false(grepl("rc_run_layer1_from_metacells", body_text, fixed = TRUE))
            expect_false(grepl("LinkPeaks", body_text, fixed = TRUE))
          })

          '''
          if insertion_anchor not in test_text:
              raise RuntimeError('Test insertion anchor missing')
          test_text = test_text.replace(insertion_anchor, new_test + insertion_anchor, 1)
          test_path.write_text(test_text)

          readme_path = Path('README.md')
          readme = readme_path.read_text()
          readme = readme.replace(
            '     metacell LinkPeaks\n     Layer 1 RNA-GPR capacity and ATAC confidence\n     Pando GRN',
            '     Pando internal peak-gene and TF-gene modeling\n     Pando-derived metacell ATAC confidence\n     Pando GRN'
          )
          readme = readme.replace(
            '→ recompute one global gene-score scale from all metacells and one reaction-wise Q95 scale',
            '→ recompute one global gene-score scale from all metacells and one reaction-wise Q95 scale'
          )
          readme = readme.replace(
            'The shared GEM is the structural reference for every metacell. Biological differences enter the LP objective through metacell-specific penalties, not through sample-specific stoichiometric models. The final expression-capacity normalization recomputes gene scores from the combined GPR-gene logCPM matrix and then applies one global reaction-wise Q95; stratum-local expression capacities are not used for cross-sample scoring.',
            'The shared GEM is the structural reference for every metacell. Biological differences enter the LP objective through metacell-specific penalties, not through sample-specific stoichiometric models. The final expression-capacity normalization recomputes gene scores from the combined GPR-gene logCPM matrix and then applies one global reaction-wise Q95. Peak-gene evidence is computed once inside Pando; RegCompass derives metacell ATAC confidence from significant Pando regions and does not run a separate LinkPeaks pass.'
          )
          readme = readme.replace(
            '  layer1_args = list(\n    min_metacells_for_linkpeaks = 10,\n    bootstrap = FALSE\n  ),',
            '  layer1_args = list(\n    promiscuity_mode = "sqrt",\n    and_method = "boltzmann",\n    tau = 0.20\n  ),'
          )
          readme_path.write_text(readme)

          news_path = Path('NEWS.md')
          news = news_path.read_text()
          anchor = '# RegCompassR global-metacell architecture\n'
          note = '- Removed the duplicate Signac LinkPeaks pass from the integrated workflow; Pando is now the sole peak-gene model, and its significant regions plus metacell accessibility define ATAC confidence.\n'
          if note not in news:
              news = news.replace(anchor, anchor + '\n' + note, 1)
          news_path.write_text(news)

          Path('.github/workflows/apply-pando-only-peak-gene.yml').unlink()
          PY

