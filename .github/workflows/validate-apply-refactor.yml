name: Validate and apply species refactor

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/species-medium-core-refactor

permissions:
  contents: write

jobs:
  validate-apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/species-medium-core-refactor
          fetch-depth: 0
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true
      - name: Reconstruct and verify source bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .github/refactor-bundle.part* > "$RUNNER_TEMP/regcompass-refactor.tar.xz"
          echo "51d2ce16459f2e1e53838fe697c19cdd5e47ab49b59d99808713d416d7bbb10e  $RUNNER_TEMP/regcompass-refactor.tar.xz" | sha256sum -c -
          xz -t "$RUNNER_TEMP/regcompass-refactor.tar.xz"
          tar -xJf "$RUNNER_TEMP/regcompass-refactor.tar.xz" -C .
          rm -f R/workflow_stage_01_architecture.R
          rm -f R/workflow_stage_02_compatibility.R
          rm -f R/workflow_stage_03_signed_projection.R
          rm -f R/workflow_stage_04_result_contracts.R
          rm -f R/workflow_stage_04b_human_medium_presets.R
          rm -f R/workflow_stage_04c_medium_default_scales.R
          rm -f R/workflow_stage_05_api_contracts.R
          rm -f R/workflow_stage_06_audit_contracts.R
          git diff --check -- DESCRIPTION NAMESPACE R tests
      - name: Install validation dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "Matrix", "matrixStats", "SeuratObject", "testthat",
            "highs", "BiocManager"
          ))
          BiocManager::install("limma", ask = FALSE, update = FALSE)
      - name: Parse, install, and test refactored package
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e 'files <- c(list.files("R", pattern="[.]R$", full.names=TRUE), list.files("tests/testthat", pattern="[.]R$", full.names=TRUE)); invisible(lapply(files, parse))'
          R CMD INSTALL . --no-multiarch --with-keep.source
          Rscript -e 'library(RegCompassR); testthat::test_dir("tests/testthat", reporter="summary", stop_on_failure=TRUE, stop_on_warning=FALSE)'
      - name: Commit validated source refactor
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DESCRIPTION NAMESPACE R tests
          if git diff --cached --quiet; then
            echo "Validated source refactor already present."
            exit 0
          fi
          git commit -m "Apply validated species-aware core refactor"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/species-medium-core-refactor
