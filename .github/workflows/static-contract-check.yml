name: Static contract check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch_mouse_plasma:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'agent/fix-mouse-plasma-provenance' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply reviewed patch script
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/patch-mouse-plasma.yml').read_text()
          start = "          python <<'PY'\n"
          end = "\n          PY\n"
          if workflow.count(start) != 1 or workflow.count(end) != 1:
              raise SystemExit('temporary patch workflow does not contain one Python payload')
          payload = workflow.split(start, 1)[1].split(end, 1)[0]
          payload = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in payload.splitlines()
          )
          exec(compile(payload, 'mouse-plasma-patch', 'exec'))
          PY
      - uses: r-lib/actions/setup-r@v2
      - name: Parse changed R and Rd files
        shell: Rscript {0}
        run: |
          parse("R/medium.R")
          parse("tests/testthat/test-plasma-medium-expansion.R")
          tools::parse_Rd("man/rc_make_medium_scenarios.Rd")
      - name: Commit implementation patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add R/medium.R tests/testthat/test-plasma-medium-expansion.R docs/plasma-medium-evidence.md docs/medium-presets.md man/rc_make_medium_scenarios.Rd NEWS.md
          git commit -m "Fix mouse plasma concentration provenance"
          git push origin HEAD:${{ github.head_ref }}

  parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Parse R sources
        shell: Rscript {0}
        run: |
          files <- list.files("R", pattern = "\\.R$", full.names = TRUE)
          invisible(lapply(files, parse))
      - name: Parse tests
        shell: Rscript {0}
        run: |
          files <- list.files("tests", pattern = "\\.[Rr]$", full.names = TRUE, recursive = TRUE)
          invisible(lapply(files, parse))
      - name: Parse installed help pages
        shell: Rscript {0}
        run: |
          files <- list.files("man", pattern = "\\.Rd$", full.names = TRUE)
          invisible(lapply(files, tools::parse_Rd))
      - name: Validate DESCRIPTION collate files
        shell: Rscript {0}
        run: |
          description <- read.dcf("DESCRIPTION")
          collate <- strsplit(description[1, "Collate"], "[[:space:]]+")[[1]]
          collate <- gsub("^'|'$", "", collate)
          collate <- collate[nzchar(collate)]
          r_files <- list.files("R", pattern = "\\.[Rr]$", full.names = FALSE)
          missing <- collate[!file.exists(file.path("R", collate))]
          unlisted <- setdiff(r_files, collate)
          duplicated <- unique(collate[duplicated(collate)])
          if (length(missing)) {
            stop("Missing Collate files: ", paste(missing, collapse = ", "))
          }
          if (length(unlisted)) {
            stop("R files missing from Collate: ", paste(unlisted, collapse = ", "))
          }
          if (length(duplicated)) {
            stop("Duplicated Collate entries: ", paste(duplicated, collapse = ", "))
          }
