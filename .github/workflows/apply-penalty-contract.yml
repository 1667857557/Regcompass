name: Apply penalty metadata contract

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-metacell-compass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0
      - name: Separate penalty enum and description
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('R/zzz_core_workflow_corrections.R')
          text = path.read_text()
          old = '''  answer$evidence_policy <-
              "penalty_only_not_the_original_COMPASS_expression_penalty"'''
          new = '''  answer$evidence_policy <- "penalty_only"'''
          if old not in text:
              raise RuntimeError('penalty policy anchor missing')
          path.write_text(text.replace(old, new, 1))

          path = Path('tests/testthat/test_math_biology_audit_v13.R')
          text = path.read_text()
          old = '  expect_match(out$evidence_policy, "not the original COMPASS")'
          new = '  expect_match(out$evidence_description, "not the original COMPASS")'
          if old not in text:
              raise RuntimeError('penalty description test anchor missing')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/apply-penalty-contract.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Separate penalty policy enum from description"
          git push origin HEAD:agent/global-metacell-compass
