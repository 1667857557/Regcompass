name: Apply mouse plasma provenance fix

on:
  push:
    branches:
      - agent/fix-mouse-plasma-provenance
    paths:
      - .github/workflows/patch-mouse-plasma.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mouse-plasma-provenance
      - name: Patch implementation, tests, and documentation
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          path = Path("R/medium.R")
          text = path.read_text()
          pattern = re.compile(
              r'  if \(identical\(preset_id, "mouse_plasma"\)\) \{\n.*?\n\s*return\(physiologic\)\n\s*\}\n',
              re.S,
          )
          replacement = '''  if (identical(preset_id, "mouse_plasma")) {
            # Quantitative target nutrients use healthy-mouse plasma-medium
            # values from Gardner and Stuart (2024; doi:10.1152/ajpcell.00452.2024).
            # The wider availability catalog is supported by murine plasma/TIF
            # measurements from Sullivan et al. (2019; doi:10.7554/eLife.44235).
            mouse_target_concentrations <- c(
              glucose = 4.381,
              lactate = 3.088,
              glutamine = 0.934
            )
            physiologic$concentration_mM <- NA_real_
            physiologic$concentration_basis <-
              "mouse_plasma_availability_only_no_quantitative_bound"
            physiologic$component_reference_doi <- NA_character_
            physiologic$uptake_fraction <- 1
            physiologic$target_exchange_flag <- FALSE

            target_index <- match(
              physiologic$metabolite_name,
              names(mouse_target_concentrations)
            )
            target_rows <- !is.na(target_index)
            physiologic$concentration_mM[target_rows] <-
              mouse_target_concentrations[target_index[target_rows]]
            physiologic$concentration_basis[target_rows] <-
              "healthy_mouse_plasma_MPM_reference"
            physiologic$component_reference_doi[target_rows] <-
              "10.1152/ajpcell.00452.2024"
            physiologic$uptake_fraction[target_rows] <- pmin(
              1,
              physiologic$concentration_mM[target_rows] /
                sensitivity_reference[sensitivity_index[target_rows]]
            )
            physiologic$target_exchange_flag[target_rows] <- TRUE
            return(physiologic)
          }
          '''
          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"expected one mouse_plasma branch, found {count}")

          old_scope = '"murine plasma and tumor interstitial-fluid polar nutrient availability",'
          new_scope = '"healthy-mouse quantitative targets plus murine plasma/TIF availability",'
          if text.count(old_scope) != 1:
              raise SystemExit("expected one mouse medium evidence scope")
          text = text.replace(old_scope, new_scope, 1)
          path.write_text(text)
          PY
      - uses: r-lib/actions/setup-r@v2
      - name: Parse changed R and Rd files
        shell: Rscript {0}
        run: |
          parse("R/medium.R")
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add R/medium.R
          git commit -m "Normalize mouse plasma source implementation"
          git push origin HEAD:agent/fix-mouse-plasma-provenance
