name: Apply final LP and penalty contracts

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-metacell-compass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0
      - name: Patch final contracts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('R/lp_solver.R')
          text = path.read_text()
          old_empty = '''    return(list(
                A = A,
                direction = character(),
                rhs = numeric()
              ))'''
          new_empty = '''    return(list(
                A = A,
                direction = character(),
                rhs = numeric(),
                sense = character(),
                bound = numeric()
              ))'''
          if old_empty not in text:
              raise RuntimeError('empty ranged-constraint contract missing')
          text = text.replace(old_empty, new_empty, 1)
          old_result = '''  list(
              A = A[source_rows, , drop = FALSE],
              direction = direction,
              rhs = bounds
            )'''
          new_result = '''  list(
              A = A[source_rows, , drop = FALSE],
              direction = direction,
              rhs = bounds,
              sense = ifelse(
                direction == "==", "=",
                ifelse(direction == ">=", ">", "<")
              ),
              bound = bounds
            )'''
          if old_result not in text:
              raise RuntimeError('ranged-constraint result contract missing')
          path.write_text(text.replace(old_result, new_result, 1))

          path = Path('R/zzz_core_workflow_corrections.R')
          text = path.read_text()
          old = '''  answer$evidence_policy <- "penalty_only"
            answer$evidence_description <- paste(
              "Multiome evidence modifies the LP objective penalty only;",
              "it does not directly change stoichiometry or reaction bounds."
            )'''
          new = '''  answer$evidence_policy <-
              "penalty_only_not_the_original_COMPASS_expression_penalty"
            answer$evidence_description <- paste(
              "This is not the original COMPASS expression-neighbourhood penalty.",
              "RegCompass multiome evidence modifies the LP objective penalty only;",
              "it does not directly change stoichiometry or reaction bounds."
            )'''
          if old not in text:
              raise RuntimeError('penalty evidence-policy contract missing')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/apply-final-contracts.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Restore LP and penalty API contracts"
          git push origin HEAD:agent/global-metacell-compass
