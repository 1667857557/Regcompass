name: Apply mathematical audit patch

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/math-biology-audit-v13

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message || '', '[math-audit-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v7
        with:
          ref: agent/math-biology-audit-v13
          fetch-depth: 0

      - name: Apply verified audit patch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/audit-apply
          cat tools/math_audit_parts/part_* > /tmp/apply_math_audit.py.gz.b64
          echo "0616b70f00a1b773ee90b0486d33cf2b967dedbcb33cbbfcc78eb072e5ed209b  /tmp/apply_math_audit.py.gz.b64" | sha256sum --check - | tee /tmp/audit-apply/payload_checksum.log
          base64 --decode /tmp/apply_math_audit.py.gz.b64 | gzip --decompress > /tmp/apply_math_audit.py
          echo "3bff76c96661d5a3d402992a564c9e7370d9c71338405de53954793a01487c73  /tmp/apply_math_audit.py" | sha256sum --check - | tee /tmp/audit-apply/script_checksum.log
          python3 -m py_compile /tmp/apply_math_audit.py
          python3 /tmp/apply_math_audit.py | tee /tmp/audit-apply/apply.log
          git status --short | tee /tmp/audit-apply/git_status_before_cleanup.txt

      - name: Remove transient patch machinery
        shell: bash
        run: |
          rm -f tools/apply_math_audit.py.gz.b64
          rm -rf tools/math_audit_parts
          rm -f .github/workflows/apply-math-audit.yaml

      - name: Commit and push audited implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "RegCompass audit bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check 2>&1 | tee /tmp/audit-apply/diff_check.log
          git commit -m "Correct mathematical and biological workflow contracts [math-audit-applied]" 2>&1 | tee /tmp/audit-apply/commit.log
          git push origin HEAD:agent/math-biology-audit-v13 2>&1 | tee /tmp/audit-apply/push.log

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: math-audit-apply-debug
          path: /tmp/audit-apply
          if-no-files-found: error
          retention-days: 7
