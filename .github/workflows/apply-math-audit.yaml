name: Apply mathematical audit patch

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/math-biology-audit-v13

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message || '', '[math-audit-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out audit branch
        uses: actions/checkout@v7
        with:
          ref: agent/math-biology-audit-v13
          fetch-depth: 0

      - name: Decode and apply patch
        shell: bash
        run: |
          base64 --decode tools/apply_math_audit.py.gz.b64 | gzip --decompress > /tmp/apply_math_audit.py
          python3 -m py_compile /tmp/apply_math_audit.py
          python3 /tmp/apply_math_audit.py

      - name: Remove transient patch machinery
        shell: bash
        run: |
          rm -f tools/apply_math_audit.py.gz.b64
          rm -f .github/workflows/apply-math-audit.yaml

      - name: Commit audited implementation
        shell: bash
        run: |
          git config user.name "RegCompass audit bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Correct mathematical and biological workflow contracts [math-audit-applied]"
          git push origin HEAD:agent/math-biology-audit-v13
