name: Direct reaction annotation refactor

on:
  push:
    branches:
      - agent/add-reaction-biological-annotations
    paths:
      - scripts/refactor_reaction_annotations.py
      - .github/workflows/direct-reaction-annotation-refactor.yml

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-reaction-biological-annotations
          fetch-depth: 0

      - name: Normalize temporary script literals
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/refactor_reaction_annotations.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "    'regcompass.R' '''",
              "    'regcompass.R'\n'''",
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Refactor annotation modules
        run: python scripts/refactor_reaction_annotations.py

      - name: Commit direct integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add R DESCRIPTION tests/testthat man/reaction_annotations.Rd scripts/refactor_reaction_annotations.py
          if git diff --cached --quiet; then
            echo "No refactor changes were produced."
            exit 0
          fi
          git commit -m "Integrate reaction annotations into canonical sources"
          git push origin HEAD:agent/add-reaction-biological-annotations
