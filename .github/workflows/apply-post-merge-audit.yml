name: Apply post-merge audit fixes

on:
  push:
    branches:
      - agent/fix-post-merge-audit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event_name == 'push' || github.head_ref == 'agent/fix-post-merge-audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-post-merge-audit
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install validation dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "Matrix", "matrixStats", "SeuratObject", "testthat",
            "highs", "yaml", "roxygen2", "BiocManager"
          ))
          BiocManager::install("limma", ask = FALSE, update = FALSE)

      - name: Apply audited fixes
        shell: bash
        run: |
          set -o pipefail
          python3 .github/post-merge-audit.py 2>&1 | tee apply-output.txt
          rm -f .github/post-merge-audit.py
          Rscript -e 'roxygen2::roxygenise()' 2>&1 | tee roxygen-output.txt
          git diff --check

      - name: Parse package and tests
        shell: bash
        run: |
          set -o pipefail
          Rscript - <<'RS' 2>&1 | tee parse-output.txt
          files <- c(
            list.files("R", pattern = "[.]R$", full.names = TRUE),
            list.files("tests/testthat", pattern = "[.]R$", full.names = TRUE)
          )
          for (file in files) {
            cat("Parsing ", file, "\n", sep = "")
            parse(file)
          }
          RS

      - name: Install and test package namespace
        shell: bash
        run: |
          set -o pipefail
          R CMD INSTALL --install-tests . --no-multiarch --with-keep.source 2>&1 | tee install-output.txt
          Rscript -e 'library(testthat); test_local(".", reporter = "summary", load_package = "installed")' 2>&1 | tee test-output.txt

      - name: Commit validated fixes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix post-merge cache and GRN correctness issues"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/fix-post-merge-audit

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-merge-audit-diagnostics
          path: |
            apply-output.txt
            roxygen-output.txt
            parse-output.txt
            install-output.txt
            test-output.txt
          if-no-files-found: warn
