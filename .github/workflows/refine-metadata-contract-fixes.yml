name: Refine metadata contract fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-metacell-pando-metadata-contracts
          fetch-depth: 0
      - name: Apply source refinements
        run: python tools/refine_metadata_contract_fixes_v2.py
      - name: Commit refined source
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add R/metacell_fragments.R R/pando_grn.R tests/testthat/test-metadata-contracts.R
          git diff --cached --quiet && exit 0
          git commit -m 'Harden metadata contract fixes'
          git push origin HEAD:agent/fix-metacell-pando-metadata-contracts
