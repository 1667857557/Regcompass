name: Apply global capacity recompute

on:
  push:
    branches:
      - agent/global-metacell-compass
    paths:
      - .github/workflows/apply-global-capacity-recompute.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out workflow branch
        uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0

      - name: Recompute expression capacity from all metacells
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def find_block_end(text, start):
              brace = text.index("{", start)
              depth = 0
              quote = None
              escaped = False
              for index in range(brace, len(text)):
                  char = text[index]
                  if quote is not None:
                      if escaped:
                          escaped = False
                      elif char == "\\":
                          escaped = True
                      elif char == quote:
                          quote = None
                      continue
                  if char in ('"', "'"):
                      quote = char
                  elif char == "{":
                      depth += 1
                  elif char == "}":
                      depth -= 1
                      if depth == 0:
                          return index + 1
              raise RuntimeError("Unbalanced function block")

          path = Path("R/global_workflow.R")
          text = path.read_text()
          anchor = '  dir.create(stratum_dir, recursive = TRUE, showWarnings = FALSE)\n\n'
          insertion = '''  dir.create(stratum_dir, recursive = TRUE, showWarnings = FALSE)\n\n  capacity_params <- list(\n    promiscuity_mode = layer1_args$promiscuity_mode %||% "sqrt",\n    and_method = layer1_args$and_method %||% "boltzmann",\n    tau = layer1_args$tau %||% 0.20,\n    or_method = "sum_sqrtK"\n  )\n\n'''
          if anchor not in text:
              raise RuntimeError("Stratum parameter insertion anchor missing")
          text = text.replace(anchor, insertion, 1)
          artifact_anchor = '    group_cols = group_cols,\n    layer1 = layer1,\n'
          artifact_replacement = '    group_cols = group_cols,\n    capacity_params = capacity_params,\n    layer1 = layer1,\n'
          if artifact_anchor not in text:
              raise RuntimeError("Artifact parameter anchor missing")
          text = text.replace(artifact_anchor, artifact_replacement, 1)

          marker = '.rc_merge_stratum_layer1 <- function'
          start = text.index(marker)
          end = find_block_end(text, start)
          replacement = r'''.rc_merge_stratum_layer1 <- function(artifacts, gem, single_cell_genes,
                                      sample_col, condition_col, celltype_col) {
  expression_list <- lapply(artifacts, function(x) x$layer1$rna_metacell_logcpm)
  if (any(vapply(expression_list, is.null, logical(1)))) {
    stop("Every upstream artifact must contain metacell RNA logCPM for global capacity recomputation.", call. = FALSE)
  }
  expression_list <- lapply(expression_list, as.matrix)
  common_genes <- Reduce(intersect, lapply(expression_list, rownames))
  common_genes <- rownames(expression_list[[1L]])[rownames(expression_list[[1L]]) %in% common_genes]
  if (!length(common_genes)) stop("No common RNA genes remain across upstream metacell artifacts.", call. = FALSE)
  expression_list <- lapply(expression_list, function(x) x[common_genes, , drop = FALSE])
  rna_logcpm <- .rc_cbind_matrix_union(expression_list)

  parameter_keys <- vapply(artifacts, function(x) {
    params <- x$capacity_params
    if (is.null(params)) return(NA_character_)
    paste(params$promiscuity_mode, params$and_method, params$tau, params$or_method, sep = "|")
  }, character(1))
  if (anyNA(parameter_keys) || length(unique(parameter_keys)) != 1L) {
    stop("Upstream artifacts must use one identical Layer 1 capacity parameter set.", call. = FALSE)
  }
  capacity_params <- artifacts[[1L]]$capacity_params
  parsed <- rc_parse_gpr_table(gem$gpr_table)
  global_gene_score <- rc_gene_score(rna_logcpm)
  C_raw <- rc_reaction_capacity(
    parsed,
    global_gene_score,
    promiscuity_mode = capacity_params$promiscuity_mode,
    tau = capacity_params$tau,
    and_method = capacity_params$and_method,
    or_method = capacity_params$or_method,
    BPPARAM = FALSE
  )
  calibrated <- rc_q95_calibrate(
    C_raw,
    bootstrap = FALSE,
    BPPARAM = FALSE,
    unit_meta = NULL,
    stratum_col = NULL
  )

  confidence_list <- lapply(artifacts, function(x) {
    rc_layer2_confidence_matrix(x$layer1$reaction_confidence, x$layer1$C_raw)
  })
  reaction_confidence <- .rc_cbind_matrix_union(confidence_list)
  reaction_confidence <- rc_align_layer2_evidence(
    reaction_confidence,
    rownames(C_raw),
    NA_real_
  )
  missing_confidence_units <- setdiff(colnames(C_raw), colnames(reaction_confidence))
  if (length(missing_confidence_units)) {
    stop("Reaction confidence is missing metacells after global alignment.", call. = FALSE)
  }
  reaction_confidence <- reaction_confidence[, colnames(C_raw), drop = FALSE]

  unit_meta <- .rc_bind_frames_fill(lapply(artifacts, function(x) x$layer1$unit_meta))
  id_col <- if ("pool_id" %in% colnames(unit_meta)) "pool_id" else if ("metacell_id" %in% colnames(unit_meta)) "metacell_id" else NULL
  if (is.null(id_col)) stop("Merged metacell metadata lacks pool_id/metacell_id.", call. = FALSE)
  unit_meta <- unit_meta[match(colnames(C_raw), as.character(unit_meta[[id_col]])), , drop = FALSE]
  if (anyNA(unit_meta[[id_col]])) stop("Merged metacell metadata are incomplete.", call. = FALSE)
  if (!"pool_id" %in% colnames(unit_meta)) unit_meta$pool_id <- as.character(unit_meta[[id_col]])
  if (!"unit_id" %in% colnames(unit_meta)) unit_meta$unit_id <- unit_meta$pool_id
  unit_meta$stratum_id <- rc_make_stratum_id(unit_meta, c(condition_col, sample_col, celltype_col))

  list(
    schema_version = "regcompass_global_layer1_v2",
    C_or_raw = C_raw,
    C_raw = C_raw,
    reaction_capacity_L1 = C_raw,
    C_rel = calibrated$C_rel,
    reaction_confidence = reaction_confidence,
    q95_diagnostics = calibrated$Q,
    capacity_calibration_scope = "all_metacells_global_gene_score_and_reaction_q95",
    capacity_params = capacity_params,
    rna_metacell_logcpm = rna_logcpm,
    global_gene_score = global_gene_score,
    gpr_diagnostics = rc_gpr_diagnostics(parsed, tolower(single_cell_genes)),
    parsed_gpr = parsed,
    unit_meta = unit_meta,
    metacell_meta = unit_meta,
    layer1_unit = "metacell",
    strict_stratum_cols = c(condition_col, sample_col, celltype_col)
  )
}'''
          text = text[:start] + replacement + text[end:]
          path.write_text(text)

          test_path = Path("tests/testthat/test_global_metacell_workflow.R")
          test_text = test_path.read_text()
          test_start = test_text.index('test_that("global Layer 1 recalibration uses one Q95 scale across all metacells"')
          test_end = find_block_end(test_text, test_start)
          if test_end < len(test_text) and test_text[test_end] == ")":
              test_end += 1
          while test_end < len(test_text) and test_text[test_end] in "\r\n":
              test_end += 1
          test_replacement = r'''test_that("global Layer 1 recomputes gene scores and reaction Q95 across all metacells", {
  artifacts <- list(
    list(
      capacity_params = list(promiscuity_mode = "sqrt", and_method = "boltzmann", tau = 0.20, or_method = "sum_sqrtK"),
      layer1 = list(
        C_raw = matrix(1, nrow = 1, dimnames = list("R1", "u1")),
        rna_metacell_logcpm = matrix(1, nrow = 1, dimnames = list("G1", "u1")),
        reaction_confidence = matrix(1, nrow = 1, dimnames = list("R1", "u1")),
        unit_meta = data.frame(pool_id = "u1", unit_id = "u1", sample_id = "S1",
                               condition = "A", cell_type = "T", stringsAsFactors = FALSE)
      )
    ),
    list(
      capacity_params = list(promiscuity_mode = "sqrt", and_method = "boltzmann", tau = 0.20, or_method = "sum_sqrtK"),
      layer1 = list(
        C_raw = matrix(1, nrow = 1, dimnames = list("R1", "u2")),
        rna_metacell_logcpm = matrix(3, nrow = 1, dimnames = list("G1", "u2")),
        reaction_confidence = matrix(1, nrow = 1, dimnames = list("R1", "u2")),
        unit_meta = data.frame(pool_id = "u2", unit_id = "u2", sample_id = "S2",
                               condition = "B", cell_type = "T", stringsAsFactors = FALSE)
      )
    )
  )
  gem <- list(gpr_table = data.frame(reaction_id = "R1", and_group_id = 1, gene = "G1"))
  out <- .rc_merge_stratum_layer1(
    artifacts, gem, single_cell_genes = "G1",
    sample_col = "sample_id", condition_col = "condition", celltype_col = "cell_type"
  )
  expect_equal(out$capacity_calibration_scope, "all_metacells_global_gene_score_and_reaction_q95")
  expect_equal(unique(as.character(out$q95_diagnostics$stratum)), "global")
  expect_identical(colnames(out$C_rel), c("u1", "u2"))
  expect_lt(out$global_gene_score["G1", "u1"], out$global_gene_score["G1", "u2"])
  expect_lt(out$C_raw["R1", "u1"], out$C_raw["R1", "u2"])
})

'''
          test_path.write_text(test_text[:test_start] + test_replacement + test_text[test_end:])
          PY

          rm -f .github/workflows/apply-global-capacity-recompute.yml

      - name: Commit global capacity recompute
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Recompute expression capacity across all metacells"
          git push origin HEAD:agent/global-metacell-compass
