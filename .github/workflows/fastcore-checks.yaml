name: RegCompassR checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Parse sources
        shell: Rscript {0}
        run: |
          files <- c(
            list.files("R", pattern = "[.]R$", full.names = TRUE),
            list.files("tests/testthat", pattern = "[.]R$", full.names = TRUE)
          )
          invisible(lapply(files, parse))

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "Matrix", "matrixStats", "SeuratObject", "Signac", "testthat",
            "highs", "BiocManager"
          ))
          BiocManager::install("limma", ask = FALSE, update = FALSE)

      - name: Install package
        shell: bash
        run: |
          set -o pipefail
          R CMD INSTALL . --no-multiarch --with-keep.source 2>&1 | tee install-output.txt

      - name: Run tests
        shell: Rscript {0}
        run: |
          output <- file("test-output.txt", open = "wt")
          sink(output, type = "output")
          sink(output, type = "message")
          status <- 0L
          tryCatch({
            library(RegCompassR)
            for (file in list.files("R", pattern = "[.]R$", full.names = TRUE)) {
              sys.source(file, envir = .GlobalEnv)
            }
            testthat::test_dir(
              "tests/testthat",
              reporter = "summary",
              stop_on_failure = TRUE,
              stop_on_warning = FALSE
            )
          }, error = function(error) {
            message("\nTEST_RUN_ERROR: ", conditionMessage(error))
            status <<- 1L
          })
          sink(type = "message")
          sink(type = "output")
          close(output)
          quit(status = status, save = "no")

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: |
            install-output.txt
            test-output.txt
          if-no-files-found: warn
