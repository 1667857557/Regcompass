name: RegCompassR checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply reviewed mouse plasma patch
        if: >-
          github.event_name == 'pull_request' &&
          github.head_ref == 'agent/fix-mouse-plasma-provenance' &&
          github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/patch-mouse-plasma.yml').read_text()
          start = "          python <<'PY'\n"
          end = "\n          PY\n"
          if workflow.count(start) != 1 or workflow.count(end) != 1:
              raise SystemExit('temporary patch workflow does not contain one Python payload')
          payload = workflow.split(start, 1)[1].split(end, 1)[0]
          payload = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in payload.splitlines()
          )
          payload = payload.replace(
              """'paste(
        "Gardner and Stuart, Am J Physiol Cell Physiol 2024;",
        "Sullivan et al., eLife 2019"
      ),'""",
              """'''paste(
        "Gardner and Stuart, Am J Physiol Cell Physiol 2024;",
        "Sullivan et al., eLife 2019"
      ),'''""",
          )
          payload = payload.replace(
              """'- Sullivan MR et al. Quantification of microenvironmental metabolites in murine
  cancers reveals determinants of tumor nutrient availability. *eLife* (2019).
  DOI: 10.7554/eLife.44235.
'""",
              """'''- Sullivan MR et al. Quantification of microenvironmental metabolites in murine
  cancers reveals determinants of tumor nutrient availability. *eLife* (2019).
  DOI: 10.7554/eLife.44235.
'''""",
          )
          payload = payload.replace(
              """'- Gardner SG and Stuart T. Tumor microenvironment-like conditions alter
  pancreatic cancer cell metabolism and behavior. *Am J Physiol Cell Physiol*
  (2024). DOI: 10.1152/ajpcell.00452.2024.
- Sullivan MR et al. Quantification of microenvironmental metabolites in murine
  cancers reveals determinants of tumor nutrient availability. *eLife* (2019).
  DOI: 10.7554/eLife.44235.
'""",
              """'''- Gardner SG and Stuart T. Tumor microenvironment-like conditions alter
  pancreatic cancer cell metabolism and behavior. *Am J Physiol Cell Physiol*
  (2024). DOI: 10.1152/ajpcell.00452.2024.
- Sullivan MR et al. Quantification of microenvironmental metabolites in murine
  cancers reveals determinants of tumor nutrient availability. *eLife* (2019).
  DOI: 10.7554/eLife.44235.
'''""",
          )
          exec(compile(payload, 'mouse-plasma-patch', 'exec'))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add R/medium.R tests/testthat/test-plasma-medium-expansion.R docs/plasma-medium-evidence.md docs/medium-presets.md man/rc_make_medium_scenarios.Rd NEWS.md
          git commit -m "Fix mouse plasma concentration provenance"
          git push origin HEAD:${{ github.head_ref }}

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system libraries
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libglpk-dev \
            libbz2-dev \
            liblzma-dev \
            zlib1g-dev

      - name: Parse sources and verify documented defaults
        shell: Rscript {0}
        run: |
          files <- c(
            list.files("R", pattern = "[.]R$", full.names = TRUE),
            list.files("tests/testthat", pattern = "[.]R$", full.names = TRUE)
          )
          invisible(lapply(files, parse))

          documentation <- c(
            "README.md",
            list.files("docs", pattern = "[.]md$", full.names = TRUE),
            list.files("vignettes", pattern = "[.]Rmd$", full.names = TRUE),
            list.files("man", pattern = "[.]Rd$", full.names = TRUE)
          )
          text <- paste(
            unlist(lapply(documentation, readLines, warn = FALSE), use.names = FALSE),
            collapse = "\n"
          )
          forbidden <- c(
            "gamma = 150",
            "gamma=150",
            "peak_cor = 0.05",
            "peak_cor=0.05",
            "peak_cor = 0.1",
            "peak_cor=0.1"
          )
          present <- forbidden[vapply(forbidden, grepl, logical(1), x = text,
                                      fixed = TRUE)]
          if (length(present)) {
            stop("Stale documented defaults remain: ", paste(present, collapse = ", "))
          }
          required <- c("gamma = 75", "peak_cor = 0.01")
          missing <- required[!vapply(required, grepl, logical(1), x = text,
                                      fixed = TRUE)]
          if (length(missing)) {
            stop("Canonical documented defaults are missing: ",
                 paste(missing, collapse = ", "))
          }

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          Rscript - <<'RSCRIPT' 2>&1 | tee dependency-output.txt
          install.packages(c(
            "Matrix", "matrixStats", "testthat", "highs",
            "BiocManager", "remotes"
          ))
          BiocManager::install(c(
            "BiocGenerics", "S4Vectors", "IRanges", "GenomeInfoDb",
            "GenomicRanges", "sparseMatrixStats", "limma"
          ), ask = FALSE, update = FALSE)
          BiocManager::install(
            c("Rhtslib", "Rsamtools"),
            ask = FALSE,
            update = FALSE,
            force = TRUE
          )
          bioc_required <- c(
            "BiocGenerics", "S4Vectors", "IRanges", "GenomeInfoDb",
            "GenomicRanges", "Rhtslib", "Rsamtools",
            "sparseMatrixStats", "limma"
          )
          bioc_missing <- bioc_required[!vapply(
            bioc_required,
            requireNamespace,
            logical(1),
            quietly = TRUE
          )]
          if (length(bioc_missing)) {
            stop("Missing Bioconductor dependencies: ",
                 paste(bioc_missing, collapse = ", "))
          }
          remotes::install_version(
            "SeuratObject", version = "4.1.4",
            dependencies = NA, upgrade = "never"
          )
          remotes::install_version(
            "Seurat", version = "4.4.0",
            dependencies = NA, upgrade = "never"
          )
          remotes::install_version(
            "Signac", version = "1.11.0",
            dependencies = NA, upgrade = "never"
          )
          expected_versions <- c(
            SeuratObject = "4.1.4",
            Seurat = "4.4.0",
            Signac = "1.11.0"
          )
          observed_versions <- vapply(
            names(expected_versions),
            function(package) as.character(packageVersion(package)),
            character(1)
          )
          if (!identical(observed_versions, expected_versions)) {
            stop(
              "Unexpected Seurat stack: ",
              paste(names(observed_versions), observed_versions,
                    sep = "=", collapse = ", ")
            )
          }
          signac_status <- tryCatch({
            library(Signac)
            paste0("loaded Signac ", as.character(packageVersion("Signac")))
          }, error = function(error) {
            paste0("ERROR: ", conditionMessage(error))
          })
          writeLines(signac_status, "signac-load-status.txt")
          if (startsWith(signac_status, "ERROR:")) stop(signac_status)
          RSCRIPT

      - name: Install package with tests
        shell: bash
        run: |
          set -o pipefail
          R CMD INSTALL --no-multiarch --with-keep.source --install-tests . \
            2>&1 | tee install-output.txt

      - name: Run source tests against installed package
        shell: Rscript {0}
        run: |
          output <- file("test-output.txt", open = "wt")
          sink(output, type = "output")
          sink(output, type = "message")
          status <- 0L
          tryCatch({
            library(RegCompassR)
            testthat::test_local(
              Sys.getenv("GITHUB_WORKSPACE"),
              reporter = "summary",
              load_package = "installed",
              stop_on_failure = TRUE,
              stop_on_warning = FALSE
            )
          }, error = function(error) {
            message("\nTEST_RUN_ERROR: ", conditionMessage(error))
            status <<- 1L
          })
          sink(type = "message")
          sink(type = "output")
          close(output)
          quit(status = status, save = "no")

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: |
            dependency-output.txt
            signac-load-status.txt
            install-output.txt
            test-output.txt
          if-no-files-found: warn
