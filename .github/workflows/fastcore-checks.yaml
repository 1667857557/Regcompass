name: RegCompassR checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "Matrix", "matrixStats", "SeuratObject", "testthat",
            "highs", "BiocManager"
          ))
          BiocManager::install("limma", ask = FALSE, update = FALSE)

      - name: Parse sources
        shell: Rscript {0}
        run: |
          files <- c(
            list.files("R", pattern = "[.]R$", full.names = TRUE),
            list.files("tests/testthat", pattern = "[.]R$", full.names = TRUE)
          )
          invisible(lapply(files, parse))

      - name: Install package
        run: R CMD INSTALL . --no-multiarch --with-keep.source

      - name: Run tests
        shell: Rscript {0}
        run: |
          library(RegCompassR)
          for (file in list.files("R", pattern = "[.]R$", full.names = TRUE)) {
            sys.source(file, envir = .GlobalEnv)
          }
          testthat::test_dir(
            "tests/testthat",
            reporter = "summary",
            stop_on_failure = TRUE,
            stop_on_warning = FALSE
          )
