name: Apply refactor source only

on:
  push:
    branches:
      - agent/species-medium-core-refactor
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/species-medium-core-refactor
          fetch-depth: 0
      - name: Verify and apply source files
        id: apply
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          (
            set -euo pipefail
            set -x
            cat .github/refactor-bundle.part* > "$RUNNER_TEMP/regcompass-refactor.tar.xz"
            echo "51d2ce16459f2e1e53838fe697c19cdd5e47ab49b59d99808713d416d7bbb10e  $RUNNER_TEMP/regcompass-refactor.tar.xz" | sha256sum -c -
            xz -t "$RUNNER_TEMP/regcompass-refactor.tar.xz"
            tar -xJf "$RUNNER_TEMP/regcompass-refactor.tar.xz" -C .
            rm -f R/workflow_stage_01_architecture.R
            rm -f R/workflow_stage_02_compatibility.R
            rm -f R/workflow_stage_03_signed_projection.R
            rm -f R/workflow_stage_04_result_contracts.R
            rm -f R/workflow_stage_04b_human_medium_presets.R
            rm -f R/workflow_stage_04c_medium_default_scales.R
            rm -f R/workflow_stage_05_api_contracts.R
            rm -f R/workflow_stage_06_audit_contracts.R
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add DESCRIPTION NAMESPACE R tests
            git status --short
            git diff --cached --check
            if git diff --cached --quiet; then
              echo "Source refactor already applied."
              exit 0
            fi
            git commit -m "Apply species-aware core refactor"
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git push origin HEAD:agent/species-medium-core-refactor
          ) 2>&1 | tee "$RUNNER_TEMP/refactor-source-diagnostics.txt"
          status=${PIPESTATUS[0]}
          echo "apply_exit_status=$status" | tee -a "$RUNNER_TEMP/refactor-source-diagnostics.txt"
          exit "$status"
      - name: Upload source diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refactor-source-diagnostics
          path: ${{ runner.temp }}/refactor-source-diagnostics.txt
          if-no-files-found: error
      - name: Fail on source apply error
        if: steps.apply.outcome != 'success'
        shell: bash
        run: exit 1
