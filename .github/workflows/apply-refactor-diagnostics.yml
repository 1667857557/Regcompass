name: Apply refactor with diagnostics

on:
  push:
    branches:
      - agent/species-medium-core-refactor
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/species-medium-core-refactor
          fetch-depth: 0
      - name: Verify and apply refactor
        id: apply
        continue-on-error: true
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            set -x
            ls -l .github/refactor-bundle.part*
            cat .github/refactor-bundle.part* > "$RUNNER_TEMP/regcompass-refactor.tar.xz"
            sha256sum "$RUNNER_TEMP/regcompass-refactor.tar.xz"
            echo "51d2ce16459f2e1e53838fe697c19cdd5e47ab49b59d99808713d416d7bbb10e  $RUNNER_TEMP/regcompass-refactor.tar.xz" | sha256sum -c -
            xz -t "$RUNNER_TEMP/regcompass-refactor.tar.xz"
            tar -tJf "$RUNNER_TEMP/regcompass-refactor.tar.xz"
            tar -xJf "$RUNNER_TEMP/regcompass-refactor.tar.xz" -C .
            rm -f .github/refactor-bundle.part*
            rm -f .github/workflows/apply-refactor-bundle.yml
            rm -f .github/workflows/apply-refactor-diagnostics.yml
            rm -f .github/workflows/export-source-for-agent.yml
            rm -f .github/refactor-patch.part00
            rm -f R/workflow_stage_01_architecture.R
            rm -f R/workflow_stage_02_compatibility.R
            rm -f R/workflow_stage_03_signed_projection.R
            rm -f R/workflow_stage_04_result_contracts.R
            rm -f R/workflow_stage_04b_human_medium_presets.R
            rm -f R/workflow_stage_04c_medium_default_scales.R
            rm -f R/workflow_stage_05_api_contracts.R
            rm -f R/workflow_stage_06_audit_contracts.R
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git status --short
            git diff --cached --check
            git commit -m "Refactor species-aware core workflow"
            git push origin HEAD:agent/species-medium-core-refactor
          ) 2>&1 | tee "$RUNNER_TEMP/refactor-diagnostics.txt"
          status=${PIPESTATUS[0]}
          echo "apply_exit_status=$status" | tee -a "$RUNNER_TEMP/refactor-diagnostics.txt"
          exit "$status"
      - name: Upload refactor diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refactor-diagnostics
          path: ${{ runner.temp }}/refactor-diagnostics.txt
          if-no-files-found: error
      - name: Fail on apply error
        if: steps.apply.outcome != 'success'
        shell: bash
        run: exit 1
