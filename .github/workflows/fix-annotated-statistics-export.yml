name: Fix annotated statistics export

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-annotated-statistics-export.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Export enriched statistics tables
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("R/condition_statistics.R")
          lines = path.read_text(encoding="utf-8").splitlines()
          replacements = {
              "condition_reaction_pairwise.tsv.gz": ("pairwise,", "answer$pairwise,"),
              "condition_reaction_omnibus.tsv.gz": ("omnibus,", "answer$omnibus,"),
          }
          counts = {key: 0 for key in replacements}
          for i, line in enumerate(lines):
              for filename, (old_value, new_value) in replacements.items():
                  if filename not in line:
                      continue
                  for j in range(i - 1, max(-1, i - 5), -1):
                      if lines[j].strip() == old_value:
                          indent = lines[j][: len(lines[j]) - len(lines[j].lstrip())]
                          lines[j] = indent + new_value
                          counts[filename] += 1
                          break
          if any(value != 1 for value in counts.values()):
              raise SystemExit(f"Unexpected export replacements: {counts}")
          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit export correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add R/condition_statistics.R
          git commit -m "Export enriched reaction statistics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
