name: Fix annotated statistics export

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/fix-annotated-statistics-export.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Export enriched statistics tables
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path("R/condition_statistics.R")
          text = path.read_text(encoding="utf-8")
          text, n_pairwise = re.subn(
              r'(\.rc_write_tsv_gz\(\n\s*)pairwise,(\n\s*file\.path\(outdir, "condition_reaction_pairwise\.tsv\.gz"\))',
              r'\1answer$pairwise,\2',
              text,
              count=1,
          )
          text, n_omnibus = re.subn(
              r'(\.rc_write_tsv_gz\(\n\s*)omnibus,(\n\s*file\.path\(outdir, "condition_reaction_omnibus\.tsv\.gz"\))',
              r'\1answer$omnibus,\2',
              text,
              count=1,
          )
          if n_pairwise != 1 or n_omnibus != 1:
              raise SystemExit(
                  f"Unexpected export replacements: pairwise={n_pairwise}, omnibus={n_omnibus}"
              )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit export correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add R/condition_statistics.R
          git commit -m "Export enriched reaction statistics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
