name: Apply medium default fix

on:
  push:
    branches:
      - agent/streamline-main-api
    paths:
      - tools/fix_medium_default.py
      - .github/workflows/apply-medium-default-fix.yaml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/streamline-main-api
          fetch-depth: 0

      - run: python3 tools/fix_medium_default.py
      - run: rm tools/fix_medium_default.py

      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "RegCompass cleanup bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix default medium scenario"
          git push origin HEAD:agent/streamline-main-api
