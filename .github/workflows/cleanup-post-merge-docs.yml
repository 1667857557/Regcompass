name: Clean post-merge audit documentation

on:
  push:
    branches:
      - agent/fix-post-merge-audit
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup-test-commit:
    if: github.event_name == 'push' || github.head_ref == 'agent/fix-post-merge-audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-post-merge-audit
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Remove internal Rd files
        shell: bash
        run: |
          set -euo pipefail
          find man -maxdepth 1 -type f -name '*.Rd' \
            ! -name 'rc_make_medium_scenarios.Rd' \
            ! -name 'rc_prepare_gem.Rd' \
            ! -name 'rc_prepare_human2_gem.Rd' \
            ! -name 'rc_prepare_mouse_gem.Rd' \
            ! -name 'rc_run_regcompass.Rd' \
            ! -name 'rc_run_regcompass_one_shot.Rd' \
            -delete
          git diff --check

      - name: Install validation dependencies
        shell: Rscript {0}
        run: |
          install.packages(c(
            "Matrix", "matrixStats", "SeuratObject", "testthat",
            "highs", "yaml", "BiocManager"
          ))
          BiocManager::install("limma", ask = FALSE, update = FALSE)

      - name: Install and test package namespace
        shell: bash
        run: |
          set -euo pipefail
          R CMD INSTALL --install-tests . --no-multiarch --with-keep.source
          Rscript -e 'library(testthat); test_local(".", reporter = "summary", load_package = "installed")'

      - name: Commit documentation cleanup
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Remove generated internal Rd files"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/fix-post-merge-audit
