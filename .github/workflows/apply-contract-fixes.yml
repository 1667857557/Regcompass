name: Apply core contract fixes

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-metacell-compass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0
      - name: Patch implementations
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def function_end(text, start):
              brace = text.index('{', start)
              depth = 0
              quote = None
              escaped = False
              for i in range(brace, len(text)):
                  ch = text[i]
                  if quote is not None:
                      if escaped:
                          escaped = False
                      elif ch == '\\':
                          escaped = True
                      elif ch == quote:
                          quote = None
                      continue
                  if ch in ('"', "'"):
                      quote = ch
                  elif ch == '{':
                      depth += 1
                  elif ch == '}':
                      depth -= 1
                      if depth == 0:
                          return i + 1
              raise RuntimeError('Unbalanced R function')

          path = Path('R/gpr_capacity.R')
          text = path.read_text()
          old = '''        vals <- gene_score[genes, j]
                  if (!length(genes) || length(vals) != length(genes) ||
                      anyNA(vals) || any(!is.finite(vals))) {
                    return(NA_real_)
                  }
                  min(vals)'''
          new = '''        if (!length(genes) || !all(genes %in% rownames(gene_score))) {
                    return(NA_real_)
                  }
                  vals <- gene_score[genes, j]
                  if (length(vals) != length(genes) || anyNA(vals) ||
                      any(!is.finite(vals))) {
                    return(NA_real_)
                  }
                  min(vals)'''
          if old not in text:
              raise RuntimeError('hard-min anchor missing')
          path.write_text(text.replace(old, new, 1))

          path = Path('R/pseudobulk.R')
          text = path.read_text()
          old = '''  active <- rc_filter_active_unit_map(unit_map)
            if (anyNA(active$cell_id)) stop("`unit_map$cell_id` must not contain NA values.", call. = FALSE)
            missing_cells <- setdiff(active$cell_id, colnames(mat))'''
          new = '''  active <- rc_filter_active_unit_map(unit_map)
            if (anyNA(active$cell_id)) stop("`unit_map$cell_id` must not contain NA values.", call. = FALSE)
            duplicated_cells <- unique(as.character(active$cell_id[duplicated(active$cell_id)]))
            if (length(duplicated_cells)) {
              stop(
                "Each cell may belong to only one active pool; duplicated cell IDs: ",
                paste(utils::head(duplicated_cells, 10L), collapse = ", "),
                call. = FALSE
              )
            }
            missing_cells <- setdiff(active$cell_id, colnames(mat))'''
          if old not in text:
              raise RuntimeError('pseudobulk anchor missing')
          path.write_text(text.replace(old, new, 1))

          path = Path('R/meta_module_definition.R')
          text = path.read_text()
          old = '''  maps <- rc_reaction_crossref_maps(
              gem,
              subsystem_table = subsystem_table
            )
            if (!nrow(maps$subsystem)) {'''
          new = '''  maps <- rc_reaction_crossref_maps(
              gem,
              subsystem_table = subsystem_table
            )
            maps$subsystem <- maps$subsystem[
              !is.na(maps$subsystem$reaction_id) &
                nzchar(trimws(as.character(maps$subsystem$reaction_id))) &
                !is.na(maps$subsystem$subsystem_id) &
                nzchar(trimws(as.character(maps$subsystem$subsystem_id))),
              , drop = FALSE
            ]
            maps$kegg <- maps$kegg[
              !is.na(maps$kegg$reaction_id) &
                nzchar(trimws(as.character(maps$kegg$reaction_id))) &
                !is.na(maps$kegg$kegg_id) &
                nzchar(trimws(as.character(maps$kegg$kegg_id))),
              , drop = FALSE
            ]
            maps$reactome <- maps$reactome[
              !is.na(maps$reactome$reaction_id) &
                nzchar(trimws(as.character(maps$reactome$reaction_id))) &
                !is.na(maps$reactome$reactome_id) &
                nzchar(trimws(as.character(maps$reactome$reactome_id))),
              , drop = FALSE
            ]
            maps$rhea_master <- maps$rhea_master[
              !is.na(maps$rhea_master$reaction_id) &
                nzchar(trimws(as.character(maps$rhea_master$reaction_id))) &
                !is.na(maps$rhea_master$rhea_master_id) &
                nzchar(trimws(as.character(maps$rhea_master$rhea_master_id))),
              , drop = FALSE
            ]
            if (!nrow(maps$subsystem)) {'''
          if old not in text:
              raise RuntimeError('cross-reference anchor missing')
          path.write_text(text.replace(old, new, 1))

          path = Path('R/layer2_penalty_lp.R')
          text = path.read_text()
          old = '  text_cols <- intersect(c("type", "reaction_type", "category", "subsystem", "name", "reaction_name"), colnames(meta))'
          new = '  text_cols <- intersect(c("role", "type", "reaction_type", "category", "subsystem", "name", "reaction_name"), colnames(meta))'
          if old not in text:
              raise RuntimeError('reaction-type anchor missing')
          path.write_text(text.replace(old, new, 1))

          path = Path('R/calibration_q95.R')
          text = path.read_text()
          marker = 'rc_reaction_confidence_gpr_aware <- function'
          start = text.index(marker)
          end = function_end(text, start)
          replacement = r'''rc_reaction_confidence_gpr_aware <- function(
              gpr_list,
              gene_confidence,
              unit_detection = NULL,
              tau_conf = 0.20,
              and_method = c("softmin", "min", "mean"),
              or_method = c("max", "prob_or", "sum_sqrtK"),
              missing_group_policy = c("complete_group", "partial_group"),
              low_confidence_quantile = NULL,
              low_confidence_threshold = NULL) {
            and_method <- match.arg(and_method)
            or_method <- match.arg(or_method)
            missing_group_policy <- match.arg(missing_group_policy)
            if (!is.null(low_confidence_threshold)) {
              if (!is.numeric(low_confidence_threshold) ||
                  length(low_confidence_threshold) != 1L ||
                  !is.finite(low_confidence_threshold) ||
                  low_confidence_threshold < 0 ||
                  low_confidence_threshold > 1) {
                stop(
                  "`low_confidence_threshold` must be NULL or one number between 0 and 1.",
                  call. = FALSE
                )
              }
              if (!is.null(low_confidence_quantile)) {
                stop(
                  "Specify only one of `low_confidence_threshold` and `low_confidence_quantile`.",
                  call. = FALSE
                )
              }
            }
            gene_confidence <- as.matrix(gene_confidence)
            if (is.null(rownames(gene_confidence)) ||
                is.null(colnames(gene_confidence))) {
              stop(
                "`gene_confidence` must have gene rownames and unit colnames.",
                call. = FALSE
              )
            }
            normalized_genes <- tolower(trimws(rownames(gene_confidence)))
            if (anyNA(normalized_genes) || any(!nzchar(normalized_genes)) ||
                anyDuplicated(normalized_genes)) {
              stop(
                "`gene_confidence` must have unique non-empty gene rownames after case normalization.",
                call. = FALSE
              )
            }
            rownames(gene_confidence) <- normalized_genes
            unit_ids <- colnames(gene_confidence)

            rows <- lapply(names(gpr_list), function(rid) {
              groups <- gpr_list[[rid]]
              group_mat <- lapply(seq_along(groups), function(k) {
                gs <- unique(tolower(trimws(as.character(groups[[k]]))))
                gs <- gs[!is.na(gs) & nzchar(gs)]
                hit <- intersect(gs, rownames(gene_confidence))
                observed_fraction <- if (!length(gs)) {
                  NA_real_
                } else {
                  length(hit) / length(gs)
                }
                complete <- length(gs) > 0L && length(hit) == length(gs)
                eligible <- complete ||
                  (identical(missing_group_policy, "partial_group") && length(hit) > 0L)
                if (!eligible) {
                  return(list(
                    conf = rep(NA_real_, length(unit_ids)),
                    observed_fraction = observed_fraction,
                    complete = complete,
                    eligible = FALSE
                  ))
                }
                x <- gene_confidence[hit, , drop = FALSE]
                conf <- if (nrow(x) == 1L) {
                  as.numeric(x[1L, ])
                } else if (identical(and_method, "min")) {
                  apply(x, 2L, function(v) {
                    if (any(!is.finite(v))) NA_real_ else min(v)
                  })
                } else if (identical(and_method, "mean")) {
                  colMeans(x, na.rm = FALSE)
                } else {
                  apply(x, 2L, rc_softmin_conf, tau = tau_conf)
                }
                list(
                  conf = conf,
                  observed_fraction = observed_fraction,
                  complete = complete,
                  eligible = TRUE
                )
              })
              if (!length(group_mat)) {
                group_mat <- list(list(
                  conf = rep(NA_real_, length(unit_ids)),
                  observed_fraction = NA_real_,
                  complete = FALSE,
                  eligible = FALSE
                ))
              }
              G <- do.call(rbind, lapply(group_mat, `[[`, "conf"))
              complete <- vapply(group_mat, `[[`, logical(1), "complete")
              eligible <- vapply(group_mat, `[[`, logical(1), "eligible")
              observed <- vapply(
                group_mat,
                `[[`,
                numeric(1),
                "observed_fraction"
              )
              if (!any(eligible)) {
                vals <- rep(NA_real_, length(unit_ids))
              } else {
                G2 <- G[eligible, , drop = FALSE]
                vals <- if (identical(or_method, "max")) {
                  apply(G2, 2L, function(v) {
                    if (all(is.na(v))) NA_real_ else max(v, na.rm = TRUE)
                  })
                } else if (identical(or_method, "prob_or")) {
                  apply(G2, 2L, function(v) {
                    v <- v[is.finite(v)]
                    if (!length(v)) return(NA_real_)
                    1 - prod(1 - pmax(0, pmin(1, v)))
                  })
                } else {
                  apply(G2, 2L, function(v) {
                    v <- v[is.finite(v)]
                    if (!length(v)) return(NA_real_)
                    sum(v) / sqrt(length(v))
                  })
                }
              }
              genes_all <- unique(tolower(unlist(groups, use.names = FALSE)))
              genes_all <- genes_all[!is.na(genes_all) & nzchar(genes_all)]
              multiome_genes <- intersect(genes_all, rownames(gene_confidence))
              data.frame(
                reaction_id = rid,
                pool_id = unit_ids,
                reaction_confidence = vals,
                reaction_evidence_score = vals,
                reaction_confidence_unpenalized = vals,
                reaction_evidence_score_unpenalized = vals,
                confidence_source = "gpr_aware_gene_confidence",
                evidence_source = "gpr_aware_gene_confidence",
                n_gpr_genes_total = length(genes_all),
                n_gpr_genes_multiome = length(multiome_genes),
                multiome_coverage_fraction = if (!length(genes_all)) {
                  NA_real_
                } else {
                  length(multiome_genes) / length(genes_all)
                },
                missing_gpr_gene_fraction = if (!length(genes_all)) {
                  NA_real_
                } else {
                  1 - length(multiome_genes) / length(genes_all)
                },
                missing_gene_fraction = if (!length(genes_all)) {
                  NA_real_
                } else {
                  1 - length(multiome_genes) / length(genes_all)
                },
                missing_subunit_confidence_penalty = NA_real_,
                detection_available = !is.null(unit_detection),
                mean_gpr_detection_rate = NA_real_,
                low_confidence_threshold = if (is.null(low_confidence_threshold)) {
                  NA_real_
                } else {
                  low_confidence_threshold
                },
                n_and_groups_total = length(groups),
                n_and_groups_complete = sum(complete),
                n_and_groups_eligible = sum(eligible),
                complete_and_group_fraction = if (!length(groups)) {
                  NA_real_
                } else {
                  mean(complete)
                },
                best_and_group_observed_fraction = if (all(is.na(observed))) {
                  NA_real_
                } else {
                  max(observed, na.rm = TRUE)
                },
                any_incomplete_gpr_group_flag = any(!complete),
                reaction_unsupported_by_complete_gpr_flag = !any(complete),
                missing_required_subunit_flag = any(!complete),
                no_complete_gpr_group_flag = !any(complete),
                stringsAsFactors = FALSE
              )
            })
            out <- do.call(rbind, rows)
            if (!is.null(low_confidence_threshold)) {
              out$low_confidence_reaction_flag <-
                is.finite(out$reaction_confidence) &
                out$reaction_confidence < low_confidence_threshold
              return(out)
            }
            rc_apply_low_confidence_quantile(out, low_confidence_quantile)
          }'''
          text = text[:start] + replacement + text[end:]
          old = '''      low_confidence_quantile = low_confidence_quantile
                )'''
          new = '''      low_confidence_quantile = low_confidence_quantile,
                  low_confidence_threshold = low_confidence_threshold
                )'''
          if old not in text:
              raise RuntimeError('public confidence forwarding anchor missing')
          path.write_text(text.replace(old, new, 1))

          Path('.github/workflows/apply-contract-fixes.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix core function contracts"
          git push origin HEAD:agent/global-metacell-compass
