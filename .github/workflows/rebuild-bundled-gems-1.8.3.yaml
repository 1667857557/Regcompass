name: Rebuild deterministic bundled GEMs

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/rebuild-bundled-gems-1.8.3.yaml
      - scripts/build-bundled-gems.R

permissions:
  contents: write

jobs:
  rebuild:
    if: github.head_ref == 'agent/regcompass-1.8.3-portable-gems'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/regcompass-1.8.3-portable-gems
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install model-build dependencies
        shell: Rscript {0}
        run: install.packages(c("Matrix", "yaml"))

      - name: Build models twice and verify deterministic checksums
        shell: bash
        run: |
          set -euo pipefail
          Rscript scripts/build-bundled-gems.R
          cp inst/extdata/gem/manifest.tsv /tmp/manifest-first.tsv
          cp inst/extdata/gem/Human2_2.0.0_regcompass.rds /tmp/human-first.rds
          cp inst/extdata/gem/Mouse_1.8.0_regcompass.rds /tmp/mouse-first.rds
          Rscript scripts/build-bundled-gems.R
          cmp /tmp/manifest-first.tsv inst/extdata/gem/manifest.tsv
          cmp /tmp/human-first.rds inst/extdata/gem/Human2_2.0.0_regcompass.rds
          cmp /tmp/mouse-first.rds inst/extdata/gem/Mouse_1.8.0_regcompass.rds

      - name: Commit deterministic assets
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inst/extdata/gem/Human2_2.0.0_regcompass.rds \
                  inst/extdata/gem/Mouse_1.8.0_regcompass.rds \
                  inst/extdata/gem/manifest.tsv
          git commit -m "Rebuild deterministic bundled GEM assets"
          git push origin HEAD:agent/regcompass-1.8.3-portable-gems
