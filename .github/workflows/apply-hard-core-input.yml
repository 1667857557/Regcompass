name: Apply hard-core input fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-metacell-compass'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/global-metacell-compass
          fetch-depth: 0
      - name: Restrict expansion anchors
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('R/zzz_core_workflow_corrections.R')
          text = path.read_text()
          old = '''  answer <- .rc_expand_meta_module_reactions_uncorrected(
              gem = gem,
              core_reactions = core_reactions,
              subsystem_table = subsystem_table,
              expansion_mode = expansion_mode,
              max_iterations = max_iterations
            )'''
          new = '''  hard_core_reactions <- .rc_hard_core_rows(core_reactions)
            answer <- .rc_expand_meta_module_reactions_uncorrected(
              gem = gem,
              core_reactions = hard_core_reactions,
              subsystem_table = subsystem_table,
              expansion_mode = expansion_mode,
              max_iterations = max_iterations
            )'''
          if old not in text:
              raise RuntimeError('meta-module expansion call anchor missing')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/apply-hard-core-input.yml').unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Restrict meta-module expansion to hard-core anchors"
          git push origin HEAD:agent/global-metacell-compass
